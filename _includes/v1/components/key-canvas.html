<div class="vault-key-canvas-wrap">
  <canvas class="vault-key-canvas" width="960" height="620" aria-label="Animated 3D key"></canvas>
</div>

<script>
(() => {
  const canvas = document.currentScript.previousElementSibling.querySelector('.vault-key-canvas')
  if (!canvas) return
  const ctx = canvas.getContext('2d')
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches

  let w = 0
  let h = 0
  let dpr = Math.min(window.devicePixelRatio || 1, 2)
  let t = 0

  function resize() {
    const bounds = canvas.getBoundingClientRect()
    w = Math.max(320, Math.floor(bounds.width))
    h = Math.floor(w * 0.62)
    canvas.style.height = `${h}px`
    canvas.width = Math.floor(w * dpr)
    canvas.height = Math.floor(h * dpr)
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
  }

  const godRays = Array.from({ length: 24 }, (_, i) => {
    const s = (i / 23) * 2 - 1
    return { spread: s, alpha: 0.01 + Math.random() * 0.03 }
  })

  function keyMaskPath() {
    const p = new Path2D()
    // shaft
    p.roundRect(-12, 64, 24, 226, 10)
    // bit
    p.rect(-42, 248, 84, 72)
    p.rect(-42, 248, 30, 24)
    p.rect(12, 278, 30, 24)
    p.rect(12, 248, 20, 18)
    // neck collars
    p.roundRect(-18, 92, 36, 8, 4)
    p.roundRect(-18, 118, 36, 8, 4)
    p.roundRect(-18, 144, 36, 8, 4)
    // trefoil bow
    p.moveTo(0, 0)
    p.arc(0, 18, 54, 0, Math.PI * 2)
    p.arc(-28, -8, 26, 0, Math.PI * 2)
    p.arc(28, -8, 26, 0, Math.PI * 2)
    p.arc(0, -30, 24, 0, Math.PI * 2)
    return p
  }

  function drawEtching() {
    ctx.save()
    ctx.globalAlpha = 0.22
    ctx.strokeStyle = '#f0dc9a'
    ctx.lineWidth = 0.65

    // interlocking circles
    for (let y = 40; y < 265; y += 24) {
      for (let x = -26; x <= 26; x += 18) {
        ctx.beginPath()
        ctx.arc(x, y, 7, 0, Math.PI * 2)
        ctx.stroke()
      }
    }

    // hex runes on shaft sides
    ctx.globalAlpha = 0.18
    for (let y = 84; y < 286; y += 16) {
      ctx.beginPath()
      ctx.moveTo(-10, y)
      ctx.lineTo(-5, y - 4)
      ctx.lineTo(0, y)
      ctx.lineTo(-5, y + 4)
      ctx.closePath()
      ctx.stroke()

      ctx.beginPath()
      ctx.moveTo(10, y)
      ctx.lineTo(5, y - 4)
      ctx.lineTo(0, y)
      ctx.lineTo(5, y + 4)
      ctx.closePath()
      ctx.stroke()
    }

    // alchemical-like sigils in bow
    ctx.globalAlpha = 0.2
    const sig = [[0, 18], [-28, -8], [28, -8], [0, -30]]
    for (const [sx, sy] of sig) {
      ctx.beginPath()
      ctx.arc(sx, sy, 9, 0, Math.PI * 2)
      ctx.stroke()
      ctx.beginPath()
      ctx.moveTo(sx - 10, sy)
      ctx.lineTo(sx + 10, sy)
      ctx.moveTo(sx, sy - 10)
      ctx.lineTo(sx, sy + 10)
      ctx.stroke()
    }

    ctx.restore()
  }

  function drawKeyMetal() {
    const mask = keyMaskPath()

    // base metal
    const metal = ctx.createLinearGradient(-70, -90, 70, 320)
    metal.addColorStop(0, '#f2df9a')
    metal.addColorStop(0.18, '#d9ba74')
    metal.addColorStop(0.42, '#8e6f36')
    metal.addColorStop(0.68, '#caa55c')
    metal.addColorStop(1, '#f0dd97')
    ctx.fillStyle = metal
    ctx.fill(mask)

    // roughness variation (micro mottling)
    ctx.save()
    ctx.clip(mask)
    for (let i = 0; i < 220; i += 1) {
      const x = -58 + Math.random() * 116
      const y = -50 + Math.random() * 390
      const r = 0.4 + Math.random() * 1.2
      ctx.globalAlpha = 0.03 + Math.random() * 0.06
      ctx.fillStyle = Math.random() > 0.5 ? '#fff2c7' : '#6a4f21'
      ctx.beginPath()
      ctx.arc(x, y, r, 0, Math.PI * 2)
      ctx.fill()
    }
    drawEtching()
    ctx.restore()

    // rim highlights / engraved edge
    ctx.strokeStyle = '#f6e7b7'
    ctx.lineWidth = 1.2
    ctx.globalAlpha = 0.75
    ctx.stroke(mask)
    ctx.strokeStyle = '#5f481f'
    ctx.lineWidth = 0.8
    ctx.globalAlpha = 0.5
    ctx.translate(1.2, 1.2)
    ctx.stroke(mask)
    ctx.translate(-1.2, -1.2)

    // central hole
    ctx.globalAlpha = 1
    ctx.fillStyle = '#090909'
    ctx.beginPath()
    ctx.arc(0, 18, 15, 0, Math.PI * 2)
    ctx.fill()
    ctx.strokeStyle = '#d6b570'
    ctx.lineWidth = 1
    ctx.stroke()
  }

  function draw() {
    t += reduceMotion ? 0 : 0.012
    const rot = -0.62 + Math.sin(t * 0.6) * 0.11
    const bob = Math.sin(t * 1.1) * 6

    ctx.clearRect(0, 0, w, h)
    ctx.fillStyle = '#000'
    ctx.fillRect(0, 0, w, h)

    // very subtle volumetric rays from upper-front
    for (const r of godRays) {
      const x0 = w * 0.5 + r.spread * w * 0.08
      const y0 = h * 0.08
      const x1 = w * 0.5 + r.spread * w * 0.36
      const y1 = h * 0.62
      ctx.globalAlpha = r.alpha
      ctx.strokeStyle = '#f0d486'
      ctx.lineWidth = 1
      ctx.beginPath()
      ctx.moveTo(x0, y0)
      ctx.lineTo(x1, y1)
      ctx.stroke()
    }

    // key glow
    const glow = ctx.createRadialGradient(w * 0.5, h * 0.5, 20, w * 0.5, h * 0.5, w * 0.42)
    glow.addColorStop(0, 'rgba(236,213,63,0.28)')
    glow.addColorStop(1, 'rgba(0,0,0,0)')
    ctx.globalAlpha = 1
    ctx.fillStyle = glow
    ctx.fillRect(0, 0, w, h)

    // contact shadow in void
    ctx.globalAlpha = 0.32
    ctx.fillStyle = '#000'
    ctx.beginPath()
    ctx.ellipse(w * 0.5, h * 0.72, 84, 18, 0, 0, Math.PI * 2)
    ctx.fill()

    // draw key (pseudo-3D transform)
    ctx.save()
    ctx.translate(w * 0.5, h * 0.49 + bob)
    ctx.rotate(rot)
    ctx.transform(1, 0, -0.28, 0.95, 0, 0) // slight 3/4 perspective
    drawKeyMetal()
    ctx.restore()

    // rim light from top-right
    ctx.globalAlpha = 0.22
    const rim = ctx.createLinearGradient(w * 0.7, h * 0.2, w * 0.42, h * 0.62)
    rim.addColorStop(0, 'rgba(255,240,180,0.36)')
    rim.addColorStop(1, 'rgba(255,240,180,0)')
    ctx.fillStyle = rim
    ctx.beginPath()
    ctx.ellipse(w * 0.52, h * 0.47, 150, 180, -0.5, 0, Math.PI * 2)
    ctx.fill()

    ctx.globalAlpha = 1
    if (!reduceMotion) requestAnimationFrame(draw)
  }

  resize()
  draw()
  window.addEventListener('resize', resize)
})()
</script>
