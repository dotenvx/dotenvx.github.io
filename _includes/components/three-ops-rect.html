<div
  class="{{ include.class }} relative overflow-hidden"
  data-ops-rect
  style="height: {{ include.height | default: '320px' }};"
>
  <canvas
    class="block h-full w-full"
    style="opacity: 0; -webkit-mask-image: radial-gradient(120% 112% at 50% 50%, rgba(0,0,0,1) 62%, rgba(0,0,0,0.92) 74%, rgba(0,0,0,0.48) 85%, rgba(0,0,0,0.1) 93%, rgba(0,0,0,0) 100%); mask-image: radial-gradient(120% 112% at 50% 50%, rgba(0,0,0,1) 62%, rgba(0,0,0,0.92) 74%, rgba(0,0,0,0.48) 85%, rgba(0,0,0,0.1) 93%, rgba(0,0,0,0) 100%);"
  ></canvas>
  <div
    data-ops-bm-controls
    class="absolute left-3 top-3 z-20 hidden rounded-md border border-zinc-700/80 bg-black/70 px-3 py-2 text-[11px] text-zinc-200"
    style="backdrop-filter: blur(2px);"
  >
    <div class="mb-1 font-semibold tracking-[0.04em] uppercase text-zinc-300">Buckler Rotation</div>
    <div class="grid grid-cols-[14px_60px_120px] items-center gap-x-2 gap-y-1">
      <label for="ops-bm-rot-x">X</label>
      <span data-ops-bm-x>0.00°</span>
      <input id="ops-bm-rot-x" data-ops-bm-slider-x type="range" min="-180" max="180" step="0.1" />
      <label for="ops-bm-rot-y">Y</label>
      <span data-ops-bm-y>0.00°</span>
      <input id="ops-bm-rot-y" data-ops-bm-slider-y type="range" min="-180" max="180" step="0.1" />
      <label for="ops-bm-rot-z">Z</label>
      <span data-ops-bm-z>0.00°</span>
      <input id="ops-bm-rot-z" data-ops-bm-slider-z type="range" min="-180" max="180" step="0.1" />
    </div>
    <div class="mt-3 mb-1 font-semibold tracking-[0.04em] uppercase text-zinc-300">Buckler Position</div>
    <div class="grid grid-cols-[14px_60px_120px] items-center gap-x-2 gap-y-1">
      <label for="ops-bm-pos-x">X</label>
      <span data-ops-bm-pos-x-label>0.00</span>
      <input id="ops-bm-pos-x" data-ops-bm-pos-x type="range" min="-3" max="3" step="0.01" />
      <label for="ops-bm-pos-y">Y</label>
      <span data-ops-bm-pos-y-label>0.00</span>
      <input id="ops-bm-pos-y" data-ops-bm-pos-y type="range" min="-3" max="3" step="0.01" />
      <label for="ops-bm-pos-z">Z</label>
      <span data-ops-bm-pos-z-label>0.00</span>
      <input id="ops-bm-pos-z" data-ops-bm-pos-z type="range" min="-3" max="3" step="0.01" />
    </div>
    <div class="mt-3 mb-1 font-semibold tracking-[0.04em] uppercase text-zinc-300">Mace Rotation</div>
    <div class="grid grid-cols-[14px_60px_120px] items-center gap-x-2 gap-y-1">
      <label for="ops-bm-mace-rot-x">X</label>
      <span data-ops-bm-mace-x>0.00°</span>
      <input id="ops-bm-mace-rot-x" data-ops-bm-mace-slider-x type="range" min="-180" max="180" step="0.1" />
      <label for="ops-bm-mace-rot-y">Y</label>
      <span data-ops-bm-mace-y>0.00°</span>
      <input id="ops-bm-mace-rot-y" data-ops-bm-mace-slider-y type="range" min="-180" max="180" step="0.1" />
      <label for="ops-bm-mace-rot-z">Z</label>
      <span data-ops-bm-mace-z>0.00°</span>
      <input id="ops-bm-mace-rot-z" data-ops-bm-mace-slider-z type="range" min="-180" max="180" step="0.1" />
    </div>
    <div class="mt-3 mb-1 font-semibold tracking-[0.04em] uppercase text-zinc-300">Mace Position</div>
    <div class="grid grid-cols-[14px_60px_120px] items-center gap-x-2 gap-y-1">
      <label for="ops-bm-mace-pos-x">X</label>
      <span data-ops-bm-mace-pos-x-label>0.00</span>
      <input id="ops-bm-mace-pos-x" data-ops-bm-mace-pos-x type="range" min="-3" max="3" step="0.01" />
      <label for="ops-bm-mace-pos-y">Y</label>
      <span data-ops-bm-mace-pos-y-label>0.00</span>
      <input id="ops-bm-mace-pos-y" data-ops-bm-mace-pos-y type="range" min="-3" max="3" step="0.01" />
      <label for="ops-bm-mace-pos-z">Z</label>
      <span data-ops-bm-mace-pos-z-label>0.00</span>
      <input id="ops-bm-mace-pos-z" data-ops-bm-mace-pos-z type="range" min="-3" max="3" step="0.01" />
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.167.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.167.1/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

  const root = document.querySelector('[data-ops-rect]:not([data-three-mounted])');
  if (!root) throw new Error('ops-rect mount target not found');

  root.setAttribute('data-three-mounted', 'true');
  const canvas = root.querySelector('canvas');
  const controlsPanel = root.querySelector('[data-ops-bm-controls]');
  const sliderX = root.querySelector('[data-ops-bm-slider-x]');
  const sliderY = root.querySelector('[data-ops-bm-slider-y]');
  const sliderZ = root.querySelector('[data-ops-bm-slider-z]');
  const labelX = root.querySelector('[data-ops-bm-x]');
  const labelY = root.querySelector('[data-ops-bm-y]');
  const labelZ = root.querySelector('[data-ops-bm-z]');
  const bucklerPosSliderX = root.querySelector('[data-ops-bm-pos-x]');
  const bucklerPosSliderY = root.querySelector('[data-ops-bm-pos-y]');
  const bucklerPosSliderZ = root.querySelector('[data-ops-bm-pos-z]');
  const bucklerPosLabelX = root.querySelector('[data-ops-bm-pos-x-label]');
  const bucklerPosLabelY = root.querySelector('[data-ops-bm-pos-y-label]');
  const bucklerPosLabelZ = root.querySelector('[data-ops-bm-pos-z-label]');
  const maceSliderX = root.querySelector('[data-ops-bm-mace-slider-x]');
  const maceSliderY = root.querySelector('[data-ops-bm-mace-slider-y]');
  const maceSliderZ = root.querySelector('[data-ops-bm-mace-slider-z]');
  const maceLabelX = root.querySelector('[data-ops-bm-mace-x]');
  const maceLabelY = root.querySelector('[data-ops-bm-mace-y]');
  const maceLabelZ = root.querySelector('[data-ops-bm-mace-z]');
  const macePosSliderX = root.querySelector('[data-ops-bm-mace-pos-x]');
  const macePosSliderY = root.querySelector('[data-ops-bm-mace-pos-y]');
  const macePosSliderZ = root.querySelector('[data-ops-bm-mace-pos-z]');
  const macePosLabelX = root.querySelector('[data-ops-bm-mace-pos-x-label]');
  const macePosLabelY = root.querySelector('[data-ops-bm-mace-pos-y-label]');
  const macePosLabelZ = root.querySelector('[data-ops-bm-mace-pos-z-label]');
  canvas.style.transition = 'opacity 300ms ease-out';

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  const scene = new THREE.Scene();
  const desktopMinFrustumSize = 1.05;
  const mobileMinFrustumSize = 0.95;
  const includeZoom = Number({{ include.zoom | default: 1 }});
  const zoomFactor = Number.isFinite(includeZoom) && includeZoom > 0 ? includeZoom : 1;
  const camera = new THREE.PerspectiveCamera(36, 1, 0.1, 100);

  scene.background = null;
  renderer.setClearColor(0x000000, 0);
  camera.up.set(0, 1, 0);
  camera.position.set(0, 6, 0.001);
  camera.lookAt(0, 0.74, 0);

  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.28;
  renderer.physicallyCorrectLights = true;

  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  const envRT = pmremGenerator.fromScene(new RoomEnvironment(), 0.04);
  scene.environment = envRT.texture;
  pmremGenerator.dispose();

  scene.add(new THREE.AmbientLight(0xffffff, 0.65));
  const keyLight = new THREE.DirectionalLight(0xbfe3ff, 2.8);
  keyLight.position.set(3, 5, 4);
  scene.add(keyLight);
  const rimLight = new THREE.DirectionalLight(0xffffff, 2.2);
  rimLight.position.set(-4, 2.5, -3);
  scene.add(rimLight);

  const boxGeometry = new THREE.BoxGeometry(0.12, 0.1662, 0.12);
  const edgeGeometry = new THREE.EdgesGeometry(boxGeometry);
  const edgeHighlightMaterial = new THREE.LineBasicMaterial({
    color: 0xe6edf7,
    transparent: true,
    opacity: 0.42,
    toneMapped: false
  });
  const glowShellMaterial = new THREE.MeshBasicMaterial({
    color: 0xd6e2f0,
    transparent: true,
    opacity: 0.12,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    depthWrite: false,
    toneMapped: false
  });

  const labelTextureCache = new Map();
  const materialCache = new Map();
  const faceMaterials = [];
  const baseRoughness = 0.045;
  const baseThickness = 1.1;
  const baseEdgeOpacity = edgeHighlightMaterial.opacity;
  const baseGlowOpacity = glowShellMaterial.opacity;
  const isMobileViewport = () => window.matchMedia('(max-width: 767px)').matches;

  const buildLabelTexture = (label) => {
    const c = document.createElement('canvas');
    c.width = 128;
    c.height = 128;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 128, 128);
    ctx.fillStyle = 'rgba(112, 122, 136, 0.16)';
    ctx.fillRect(0, 0, 128, 128);
    // Intentionally no face text labels on mace blocks.
    const texture = new THREE.CanvasTexture(c);
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.needsUpdate = true;
    return texture;
  };

  const getLabelTexture = (label) => {
    if (!labelTextureCache.has(label)) labelTextureCache.set(label, buildLabelTexture(label));
    return labelTextureCache.get(label);
  };

  const getFaceMaterial = (label) => {
    if (!materialCache.has(label)) {
      materialCache.set(label, new THREE.MeshPhysicalMaterial({
        color: 0xb7c2cf,
        transparent: true,
        opacity: 0.94,
        map: getLabelTexture(label),
        metalness: 0.86,
        roughness: 0.2,
        transmission: 0.08,
        thickness: 0.22,
        ior: 1.5,
        clearcoat: 0.65,
        clearcoatRoughness: 0.08,
        attenuationColor: 0x8f9aab,
        attenuationDistance: 2.2,
        envMapIntensity: 2.35
      }));
    }
    return materialCache.get(label);
  };

  const createFaceMaterialVariant = (label, roughnessOffset, thicknessOffset, faceRole) => {
    const mat = getFaceMaterial(label).clone();
    mat.roughness = THREE.MathUtils.clamp(baseRoughness + roughnessOffset, 0.006, 0.06);
    mat.thickness = THREE.MathUtils.clamp(baseThickness + thicknessOffset, 1.35, 1.9);
    if (faceRole === 'top') {
      mat.opacity = 0.96;
      mat.transmission = 0.06;
      mat.roughness = 0.16;
      mat.thickness = 0.2;
      mat.clearcoatRoughness = 0.06;
    } else if (faceRole === 'bottom') {
      mat.opacity = 0.92;
      mat.transmission = 0.05;
      mat.roughness = 0.24;
      mat.thickness = 0.2;
      mat.clearcoatRoughness = 0.1;
    } else {
      mat.opacity = 0.94;
      mat.transmission = 0.07;
      mat.roughness = 0.2;
      mat.thickness = 0.22;
      mat.clearcoatRoughness = 0.08;
    }
    mat.userData.baseOpacity = mat.opacity;
    mat.userData.baseEnvMapIntensity = mat.envMapIntensity;
    mat.userData.baseTransmission = mat.transmission;
    mat.userData.baseThickness = mat.thickness;
    mat.emissive = new THREE.Color(0x000000);
    mat.emissiveIntensity = 0;
    mat.userData.baseEmissiveIntensity = 0;
    faceMaterials.push(mat);
    return mat;
  };

  const createBox = ({ position = [0, 0.74, 0] } = {}) => {
    const roughnessOffset = (Math.random() - 0.5) * 0.02;
    const thicknessOffset = (Math.random() - 0.5) * 0.18;
    const mesh = new THREE.Mesh(boxGeometry, [
      createFaceMaterialVariant('s1', roughnessOffset, thicknessOffset, 'side'),
      createFaceMaterialVariant('s2', roughnessOffset, thicknessOffset, 'side'),
      createFaceMaterialVariant('t', roughnessOffset, thicknessOffset, 'top'),
      createFaceMaterialVariant('b', roughnessOffset, thicknessOffset, 'bottom'),
      createFaceMaterialVariant('s3', roughnessOffset, thicknessOffset, 'side'),
      createFaceMaterialVariant('s4', roughnessOffset, thicknessOffset, 'side')
    ]);
    mesh.position.set(position[0], position[1], position[2]);
    const edgeLines = new THREE.LineSegments(edgeGeometry, edgeHighlightMaterial);
    edgeLines.renderOrder = 2;
    mesh.add(edgeLines);
    const glowShell = new THREE.Mesh(boxGeometry, glowShellMaterial);
    glowShell.scale.set(1.12, 1.12, 1.12);
    glowShell.renderOrder = 0;
    mesh.add(glowShell);
    return mesh;
  };

  const setCubeAlpha = (mesh, alpha) => {
    const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
    for (let i = 0; i < mats.length; i += 1) {
      const m = mats[i];
      if (typeof m.userData.baseOpacity !== 'number') continue;
      m.opacity = Math.min(0.74, m.userData.baseOpacity * 1.95) * alpha;
      m.transparent = true;
    }
  };

  const smoothstep = (edge0, edge1, x) => {
    const t = THREE.MathUtils.clamp((x - edge0) / (edge1 - edge0), 0, 1);
    return t * t * (3 - 2 * t);
  };

  const bucklerGroup = new THREE.Group();
  const pitch = 0.125;
  const yLift = 0.152;
  const baseY = 0.28;

  const addStack = (x, z, height) => {
    for (let level = 0; level < height; level += 1) {
      const box = createBox({ position: [x * pitch, baseY + level * yLift, z * pitch] });
      bucklerGroup.add(box);
    }
  };

  const addStackFromLevel = (x, z, startLevel, height) => {
    for (let level = 0; level < height; level += 1) {
      const box = createBox({ position: [x * pitch, baseY + (startLevel + level) * yLift, z * pitch] });
      bucklerGroup.add(box);
    }
  };

  const addStackToGroup = (group, x, z, height, startLevel = 0) => {
    for (let level = 0; level < height; level += 1) {
      const box = createBox({ position: [x * pitch, baseY + (startLevel + level) * yLift, z * pitch] });
      group.add(box);
    }
  };

  // Buckler base map.
  const bucklerBaseRows = [
    '01111111110',
    '11111111111',
    '11111111111',
    '11111111111',
    '11111111111',
    '11111111111',
    '11111111111',
    '11111111111',
    '11111111111',
    '01111111110',
    '00111111100',
    '00011111000',
    '00001110000',
    '00000100000'
  ];

  const bucklerRows = [...bucklerBaseRows];

  for (let z = 0; z < bucklerRows.length; z += 1) {
    const row = bucklerRows[z];
    for (let i = 0; i < row.length; i += 1) {
      const val = row[i];
      if (val === '0') continue;
      const x = i - ((row.length - 1) / 2);
      const height = val === '2' ? 2 : 1;
      addStack(x, z, height);
    }
  }

  // Raised center cross (solid cubes on top of shield surface, no negative space).
  // Vertical bar
  for (let z = 2; z <= 9; z += 1) {
    addStackFromLevel(0, z, 1, 1);
  }
  // Horizontal bar
  for (let x = -3; x <= 3; x += 1) {
    addStackFromLevel(x, 5, 1, 1);
  }

  // Back-side bolt anchors (first two).
  addStackFromLevel(-3, 3, -2, 2);
  addStackFromLevel(3, 3, -2, 2);
  addStackFromLevel(-3, 7, -2, 2);
  addStackFromLevel(3, 7, -2, 2);
  // Left-side handle bridge between top and bottom protrusions.
  addStackFromLevel(-3, 4, -2, 1);
  addStackFromLevel(-3, 5, -2, 1);
  addStackFromLevel(-3, 6, -2, 1);
  // Right-side handle bridge between top and bottom protrusions.
  addStackFromLevel(3, 4, -2, 1);
  addStackFromLevel(3, 5, -2, 1);
  addStackFromLevel(3, 6, -2, 1);

  // Mace overlay.
  const maceGroup = new THREE.Group();
  const maceRows = [
    '00100',
    '01110',
    '01110',
    '11111',
    '01110',
    '01110',
    '01110',
    '00100',
    '00100',
    '00100',
    '00100',
    '00100',
    '00100',
    '00100',
    '00100',
    '01110',
    '00100',
    '00100',
    '00100',
    '00100',
    '00100',
    '01110'
  ];

  for (let z = 0; z < maceRows.length; z += 1) {
    const row = maceRows[z];
    for (let i = 0; i < row.length; i += 1) {
      if (row[i] === '0') continue;
      addStackToGroup(maceGroup, i - 2, z, 1);
    }
  }

  // Side pairs that define the mace silhouette in this top view.
  [1, 2, 3, 4, 5, 6, 15, 21].forEach((z) => {
    addStackToGroup(maceGroup, 0, z, 1, -1);
    addStackToGroup(maceGroup, 0, z, 1, 1);
  });
  // Wider pair at z3.
  addStackToGroup(maceGroup, 0, 3, 1, -2);
  addStackToGroup(maceGroup, 0, 3, 1, 2);

  // Re-center mace local pivot to its geometric center so default placement is balanced.
  const maceLocalBounds = new THREE.Box3().setFromObject(maceGroup);
  const macePivot = new THREE.Vector3();
  maceLocalBounds.getCenter(macePivot);
  for (let i = 0; i < maceGroup.children.length; i += 1) {
    maceGroup.children[i].position.sub(macePivot);
  }

  // Crossbow overlay (matrix + elevated string layer).
  const crossbowGroup = new THREE.Group();
  const crossbowMatrix = [
    '00000000000000000',
    '00000000011110000',
    '00011001111011000',
    '00100111100000000',
    '00101110000000000',
    '00011111000000000',
    '00011111110000000',
    '00110111100000000',
    '00110011111000000',
    '01100011111100000',
    '01100000111110000',
    '01000000011110000',
    '01100000001111000',
    '00100000000011100',
    '00000000000001110',
    '00000000000000100',
    '00000000000000000'
  ];
  const crossbowCenterX = 8;
  const crossbowCenterZ = 9;
  const crossbowAllCubes = [];
  let coreSumX = 0;
  let coreSumZ = 0;
  let coreCount = 0;
  const crossbowStringCoords = [
    [4, 13],
    [5, 12],
    [6, 11],
    [7, 10],
    [8, 9],
    [9, 8],
    [10, 7],
    [11, 6],
    [12, 5],
    [13, 4]
  ];

  for (let row = 0; row < crossbowMatrix.length; row += 1) {
    const cells = crossbowMatrix[row];
    for (let col = 0; col < cells.length; col += 1) {
      if (cells[col] !== '1') continue;
      const x = (col - crossbowCenterX) * pitch;
      const z = (row - crossbowCenterZ) * pitch;
      const cube = createBox({ position: [x, baseY, z] });
      crossbowAllCubes.push(cube);
      crossbowGroup.add(cube);
      coreSumX += x;
      coreSumZ += z;
      coreCount += 1;
    }
  }

  for (let i = 0; i < crossbowStringCoords.length; i += 1) {
    const [x1, y1] = crossbowStringCoords[i];
    const x = ((x1 - 1) - crossbowCenterX) * pitch;
    const z = ((y1 - 1) - crossbowCenterZ) * pitch;
    const cube = createBox({ position: [x, baseY + yLift, z] });
    crossbowAllCubes.push(cube);
    crossbowGroup.add(cube);
  }

  // Recenter around the core-layer centroid so rotation axis passes through core mass center.
  const coreCenterX = coreCount > 0 ? (coreSumX / coreCount) : 0;
  const coreCenterZ = coreCount > 0 ? (coreSumZ / coreCount) : 0;
  for (let i = 0; i < crossbowAllCubes.length; i += 1) {
    crossbowAllCubes[i].position.x -= coreCenterX;
    crossbowAllCubes[i].position.y -= baseY;
    crossbowAllCubes[i].position.z -= coreCenterZ;
  }

  // Composition defaults.
  const bucklerStartPosition = new THREE.Vector3(0, 0, -0.08);
  const maceStartOffset = new THREE.Vector3(0, 0, -0.04);
  const crossbowStartOffset = new THREE.Vector3(0, baseY, -0.04);
  maceGroup.position.copy(maceStartOffset);
  maceGroup.rotation.set(
    THREE.MathUtils.degToRad(28),
    THREE.MathUtils.degToRad(-30),
    THREE.MathUtils.degToRad(36)
  );
  crossbowGroup.position.copy(crossbowStartOffset);
  crossbowGroup.rotation.set(
    THREE.MathUtils.degToRad(28),
    THREE.MathUtils.degToRad(-30),
    THREE.MathUtils.degToRad(36)
  );

  // Crossbow shaft axis (local) based on the drawn diagonal direction.
  const crossbowSpinAxisLocal = new THREE.Vector3(1, 0, 1).normalize();
  // Rotate crossbow heading to align with mace-like diagonal direction.
  // This is an in-plane orientation correction (not an axle twist).
  const crossbowHeadingOffset = THREE.MathUtils.degToRad(-53);
  crossbowGroup.rotateY(crossbowHeadingOffset);
  const crossbowSpinAxisWorld = crossbowSpinAxisLocal.clone().applyQuaternion(crossbowGroup.quaternion).normalize();
  const updateCrossbowAxleLine = () => {};

  // Re-center local pivot so rotation occurs around true shield center.
  const bucklerLocalBounds = new THREE.Box3().setFromObject(bucklerGroup);
  const bucklerPivot = new THREE.Vector3();
  bucklerLocalBounds.getCenter(bucklerPivot);
  for (let i = 0; i < bucklerGroup.children.length; i += 1) {
    bucklerGroup.children[i].position.sub(bucklerPivot);
  }

  // Rotation defaults from provided values.
  const radToDeg = (r) => (r * 180) / Math.PI;
  const degToRad = (d) => (d * Math.PI) / 180;
  const rotDeg = {
    x: 33.2,
    y: -32.2,
    z: 40.1
  };
  const maceRotDeg = {
    x: 33.2,
    y: -32.2,
    z: 40.1
  };
  const syncRotationUi = () => {
    if (sliderX) sliderX.value = String(rotDeg.x);
    if (sliderY) sliderY.value = String(rotDeg.y);
    if (sliderZ) sliderZ.value = String(rotDeg.z);
    if (labelX) labelX.textContent = `${rotDeg.x.toFixed(2)}°`;
    if (labelY) labelY.textContent = `${rotDeg.y.toFixed(2)}°`;
    if (labelZ) labelZ.textContent = `${rotDeg.z.toFixed(2)}°`;
  };
  const syncMaceRotationUi = () => {
    if (maceSliderX) maceSliderX.value = String(maceRotDeg.x);
    if (maceSliderY) maceSliderY.value = String(maceRotDeg.y);
    if (maceSliderZ) maceSliderZ.value = String(maceRotDeg.z);
    if (maceLabelX) maceLabelX.textContent = `${maceRotDeg.x.toFixed(2)}°`;
    if (maceLabelY) maceLabelY.textContent = `${maceRotDeg.y.toFixed(2)}°`;
    if (maceLabelZ) maceLabelZ.textContent = `${maceRotDeg.z.toFixed(2)}°`;
  };
  const applyBucklerRotation = () => {
    bucklerGroup.rotation.x = degToRad(rotDeg.x);
    bucklerGroup.rotation.y = degToRad(rotDeg.y);
    bucklerGroup.rotation.z = degToRad(rotDeg.z);
    syncRotationUi();
  };
  const applyMaceRotation = () => {
    maceGroup.rotation.x = degToRad(maceRotDeg.x);
    maceGroup.rotation.y = degToRad(maceRotDeg.y);
    maceGroup.rotation.z = degToRad(maceRotDeg.z);
    syncMaceRotationUi();
  };
  const onSliderInput = (axis, slider) => {
    if (!slider) return;
    slider.addEventListener('input', () => {
      rotDeg[axis] = Number(slider.value);
      applyBucklerRotation();
    });
  };
  const onMaceSliderInput = (axis, slider) => {
    if (!slider) return;
    slider.addEventListener('input', () => {
      maceRotDeg[axis] = Number(slider.value);
      applyMaceRotation();
    });
  };
  onSliderInput('x', sliderX);
  onSliderInput('y', sliderY);
  onSliderInput('z', sliderZ);
  onMaceSliderInput('x', maceSliderX);
  onMaceSliderInput('y', maceSliderY);
  onMaceSliderInput('z', maceSliderZ);
  if (controlsPanel) controlsPanel.style.pointerEvents = 'auto';
  applyBucklerRotation();
  applyMaceRotation();
  let bucklerSceneScale = 0.65;
  let maceSceneScale = 0.65;
  let crossbowSceneScale = 0.65;
  bucklerGroup.scale.setScalar(bucklerSceneScale);
  maceGroup.scale.setScalar(maceSceneScale);
  crossbowGroup.scale.setScalar(crossbowSceneScale);
  scene.add(bucklerGroup);
  maceGroup.visible = false;
  scene.add(maceGroup);
  crossbowGroup.visible = false;
  scene.add(crossbowGroup);

  const bucklerCubes = bucklerGroup.children.filter((c) => c.isMesh);
  const maceCubes = maceGroup.children.filter((c) => c.isMesh);
  const crossbowCubes = crossbowGroup.children.filter((c) => c.isMesh);

  for (let i = 0; i < bucklerCubes.length; i += 1) {
    const cube = bucklerCubes[i];
    cube.userData.home = cube.position.clone();
    cube.userData.scatter = new THREE.Vector3(
      (Math.random() - 0.5) * 1.8,
      (Math.random() - 0.2) * 1.1,
      (Math.random() - 0.5) * 1.8
    );
    const ringX = (i % 5) - 2;
    const ringZ = (Math.floor(i / 5) % 5) - 2;
    const ringY = (i % 7) - 3;
    cube.userData.forge = new THREE.Vector3(ringX * 0.04, ringY * 0.02, ringZ * 0.04);
    setCubeAlpha(cube, 0);
    cube.scale.setScalar(0.01);
    cube.visible = false;
  }
  for (let i = 0; i < maceCubes.length; i += 1) {
    const cube = maceCubes[i];
    cube.userData.home = cube.position.clone();
    cube.userData.scatter = new THREE.Vector3(
      (Math.random() - 0.5) * 1.8,
      (Math.random() - 0.2) * 1.1,
      (Math.random() - 0.5) * 1.8
    );
    const ringX = (i % 5) - 2;
    const ringZ = (Math.floor(i / 5) % 5) - 2;
    const ringY = (i % 7) - 3;
    cube.userData.forge = new THREE.Vector3(ringX * 0.04, ringY * 0.02, ringZ * 0.04);
    setCubeAlpha(cube, 0);
    cube.scale.setScalar(0.01);
    cube.visible = false;
    cube.position.copy(cube.userData.home);
  }
  for (let i = 0; i < crossbowCubes.length; i += 1) {
    const cube = crossbowCubes[i];
    cube.userData.home = cube.position.clone();
    cube.userData.scatter = new THREE.Vector3(
      (Math.random() - 0.5) * 1.8,
      (Math.random() - 0.2) * 1.1,
      (Math.random() - 0.5) * 1.8
    );
    const ringX = (i % 5) - 2;
    const ringZ = (Math.floor(i / 5) % 5) - 2;
    const ringY = (i % 7) - 3;
    cube.userData.forge = new THREE.Vector3(ringX * 0.04, ringY * 0.02, ringZ * 0.04);
    setCubeAlpha(cube, 0);
    cube.scale.setScalar(0.01);
    cube.visible = false;
    cube.position.copy(cube.userData.home);
  }

  // Build-in animation order (network-like growth from a seed).
  const quantize = (value, step) => Math.round(value / step);
  const buildOrderFromSeed = (cubes, seedMode) => {
    const nodes = cubes.map((cube, idx) => {
      const p = cube.userData.home;
      return {
        idx,
        cube,
        qx: quantize(p.x, pitch),
        qy: quantize(p.y, yLift),
        qz: quantize(p.z, pitch)
      };
    });
    const seed = nodes.reduce((best, node) => {
      if (!best) return node;
      if (seedMode === 'maxZCenter') {
        if (node.qz > best.qz) return node;
        if (node.qz < best.qz) return best;
        const nodeCenter = Math.abs(node.qx) + Math.abs(node.qy);
        const bestCenter = Math.abs(best.qx) + Math.abs(best.qy);
        return nodeCenter < bestCenter ? node : best;
      }
      return best;
    }, null);
    nodes.sort((a, b) => {
      const da = Math.abs(a.qx - seed.qx) + Math.abs(a.qy - seed.qy) + Math.abs(a.qz - seed.qz);
      const db = Math.abs(b.qx - seed.qx) + Math.abs(b.qy - seed.qy) + Math.abs(b.qz - seed.qz);
      if (da !== db) return da - db;
      if (a.qz !== b.qz) return b.qz - a.qz;
      return Math.abs(a.qx) - Math.abs(b.qx);
    });
    return nodes.map((n) => n.cube);
  };

  const maceBuildOrder = buildOrderFromSeed(maceCubes, 'maxZCenter');
  const crossbowBuildOrder = buildOrderFromSeed(crossbowCubes, 'maxZCenter');
  const bucklerBuildOrder = buildOrderFromSeed(bucklerCubes, 'maxZCenter');
  const buildEnabled = true;
  const animationSpeedMultiplier = 0.35; // 65% faster
  const maceBuildDelayMs = 26 * animationSpeedMultiplier;
  const crossbowBuildDelayMs = 20 * animationSpeedMultiplier;
  const bucklerBuildDelayMs = 14 * animationSpeedMultiplier;
  const buildPopMs = 110 * animationSpeedMultiplier;
  const maceBuildStartMs = 0;
  const bucklerBuildStartMs = 140 * animationSpeedMultiplier;
  const buildStartAt = performance.now() + 120 * animationSpeedMultiplier;

  const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
  const applyBuildPass = (order, elapsedMs, startOffset, perCubeDelayMs) => {
    for (let i = 0; i < order.length; i += 1) {
      const cube = order[i];
      const t = THREE.MathUtils.clamp((elapsedMs - startOffset - i * perCubeDelayMs) / buildPopMs, 0, 1);
      if (t <= 0) {
        cube.visible = false;
        continue;
      }
      cube.visible = true;
      const e = easeOutCubic(t);
      setCubeAlpha(cube, e);
      cube.scale.setScalar(0.01 + e * 0.99);
    }
  };
  const applyUnbuildPass = (order, elapsedMs, perCubeDelayMs) => {
    for (let i = 0; i < order.length; i += 1) {
      const cube = order[i];
      const t = THREE.MathUtils.clamp((elapsedMs - i * perCubeDelayMs) / buildPopMs, 0, 1);
      if (t <= 0) {
        cube.visible = true;
        setCubeAlpha(cube, 1);
        cube.scale.setScalar(1);
        continue;
      }
      const e = easeOutCubic(t);
      const alpha = 1 - e;
      if (alpha <= 0.001) {
        cube.visible = false;
        continue;
      }
      cube.visible = true;
      setCubeAlpha(cube, alpha);
      cube.scale.setScalar(1 - e * 0.99);
    }
  };

  let scenePhase = 'intro'; // intro -> ready -> unbuild_to_mace -> mace -> unbuild_to_crossbow -> crossbow -> unbuild_to_buckler -> ready
  let phaseStartAt = buildStartAt;
  const bucklerUnbuildOrder = [...bucklerBuildOrder].reverse();
  const maceUnbuildOrder = [...maceBuildOrder].reverse();
  const crossbowUnbuildOrder = [...crossbowBuildOrder].reverse();
  const bucklerUnbuildDelayMs = 12 * animationSpeedMultiplier;
  const maceUnbuildDelayMs = 14 * animationSpeedMultiplier;
  const crossbowUnbuildDelayMs = 12 * animationSpeedMultiplier;
  const bucklerUnbuildDurationMs = Math.max(0, (bucklerUnbuildOrder.length - 1) * bucklerUnbuildDelayMs + buildPopMs);
  const maceUnbuildDurationMs = Math.max(0, (maceUnbuildOrder.length - 1) * maceUnbuildDelayMs + buildPopMs);
  const crossbowUnbuildDurationMs = Math.max(0, (crossbowUnbuildOrder.length - 1) * crossbowUnbuildDelayMs + buildPopMs);
  const bucklerBuildDurationMs = Math.max(0, (bucklerBuildOrder.length - 1) * bucklerBuildDelayMs + buildPopMs);
  const maceBuildDurationMs = Math.max(0, (maceBuildOrder.length - 1) * maceBuildDelayMs + buildPopMs);
  const crossbowBuildDurationMs = Math.max(0, (crossbowBuildOrder.length - 1) * crossbowBuildDelayMs + buildPopMs);

  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();
  const isStablePhase = () => scenePhase === 'ready' || scenePhase === 'mace' || scenePhase === 'crossbow';
  const clickDragThresholdPx = 8;
  let pointerDownPoint = null;
  let lastPointerX = 0;

  const getActiveGroup = () => {
    if (scenePhase === 'ready') return bucklerGroup;
    if (scenePhase === 'mace') return maceGroup;
    if (scenePhase === 'crossbow') return crossbowGroup;
    return null;
  };

  canvas.addEventListener('pointerdown', (event) => {
    if (!isStablePhase()) return;
    pointerDownPoint = { x: event.clientX, y: event.clientY };
    lastPointerX = event.clientX;
  });

  canvas.addEventListener('pointermove', (event) => {
    if (!pointerDownPoint || !isStablePhase()) return;
    const dx = event.clientX - lastPointerX;
    lastPointerX = event.clientX;
    if (Math.abs(dx) < 0.1) return;
    const activeGroup = getActiveGroup();
    if (!activeGroup) return;
    const dragDelta = dx * 0.01;
    if (scenePhase === 'crossbow') {
      activeGroup.rotateOnWorldAxis(crossbowSpinAxisWorld, dragDelta);
      updateCrossbowAxleLine();
    } else {
      activeGroup.rotation.z += dragDelta;
    }
  });

  canvas.addEventListener('pointercancel', () => {
    pointerDownPoint = null;
  });

  canvas.addEventListener('pointerup', (event) => {
    if (!pointerDownPoint || !isStablePhase()) {
      pointerDownPoint = null;
      return;
    }

    const dx = event.clientX - pointerDownPoint.x;
    const dy = event.clientY - pointerDownPoint.y;
    pointerDownPoint = null;
    if ((dx * dx + dy * dy) > (clickDragThresholdPx * clickDragThresholdPx)) return;

    const rect = canvas.getBoundingClientRect();
    pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    const targets = scenePhase === 'ready'
      ? bucklerCubes.filter((cube) => cube.visible)
      : scenePhase === 'mace'
        ? maceCubes.filter((cube) => cube.visible)
        : crossbowCubes.filter((cube) => cube.visible);
    const hits = raycaster.intersectObjects(targets, false);
    if (hits.length === 0) return;

    scenePhase = scenePhase === 'ready'
      ? 'unbuild_to_mace'
      : scenePhase === 'mace'
        ? 'unbuild_to_crossbow'
        : 'unbuild_to_buckler';
    phaseStartAt = performance.now();
    bucklerGroup.visible = true;
    maceGroup.visible = true;
    crossbowGroup.visible = true;
  });

  const bounds = new THREE.Box3().setFromObject(bucklerGroup);
  const center = new THREE.Vector3();
  const size = new THREE.Vector3();
  bounds.getCenter(center);
  bounds.getSize(size);
  bucklerGroup.position.copy(bucklerStartPosition);
  maceGroup.position.set(
    center.x + maceStartOffset.x,
    center.y + maceStartOffset.y,
    center.z + maceStartOffset.z
  );
  crossbowGroup.position.set(
    center.x + crossbowStartOffset.x,
    center.y + crossbowStartOffset.y,
    center.z + crossbowStartOffset.z
  );
  const bucklerPos = {
    x: bucklerGroup.position.x,
    y: bucklerGroup.position.y,
    z: bucklerGroup.position.z
  };
  const macePos = {
    x: maceGroup.position.x,
    y: maceGroup.position.y,
    z: maceGroup.position.z
  };
  const crossbowPos = {
    x: crossbowGroup.position.x,
    y: crossbowGroup.position.y,
    z: crossbowGroup.position.z
  };
  const desktopMacePositionOffset = new THREE.Vector3(0, 0, 0);
  const mobileMacePositionOffset = new THREE.Vector3(0, 0, 0);
  const macePositionOffset = desktopMacePositionOffset.clone();
  const desktopCrossbowPositionOffset = new THREE.Vector3(0, 0, 0);
  const mobileCrossbowPositionOffset = new THREE.Vector3(0, 0, 0);
  const crossbowPositionOffset = desktopCrossbowPositionOffset.clone();
  const syncBucklerPositionUi = () => {
    if (bucklerPosSliderX) bucklerPosSliderX.value = String(bucklerPos.x);
    if (bucklerPosSliderY) bucklerPosSliderY.value = String(bucklerPos.y);
    if (bucklerPosSliderZ) bucklerPosSliderZ.value = String(bucklerPos.z);
    if (bucklerPosLabelX) bucklerPosLabelX.textContent = bucklerPos.x.toFixed(2);
    if (bucklerPosLabelY) bucklerPosLabelY.textContent = bucklerPos.y.toFixed(2);
    if (bucklerPosLabelZ) bucklerPosLabelZ.textContent = bucklerPos.z.toFixed(2);
  };
  const syncMacePositionUi = () => {
    if (macePosSliderX) macePosSliderX.value = String(macePos.x);
    if (macePosSliderY) macePosSliderY.value = String(macePos.y);
    if (macePosSliderZ) macePosSliderZ.value = String(macePos.z);
    if (macePosLabelX) macePosLabelX.textContent = macePos.x.toFixed(2);
    if (macePosLabelY) macePosLabelY.textContent = macePos.y.toFixed(2);
    if (macePosLabelZ) macePosLabelZ.textContent = macePos.z.toFixed(2);
  };
  const applyBucklerPosition = () => {
    bucklerGroup.position.set(bucklerPos.x, bucklerPos.y, bucklerPos.z);
    syncBucklerPositionUi();
  };
  const applyMacePosition = () => {
    maceGroup.position.set(
      macePos.x + macePositionOffset.x,
      macePos.y + macePositionOffset.y,
      macePos.z + macePositionOffset.z
    );
    syncMacePositionUi();
  };
  const applyCrossbowPosition = () => {
    crossbowGroup.position.set(
      crossbowPos.x + crossbowPositionOffset.x,
      crossbowPos.y + crossbowPositionOffset.y,
      crossbowPos.z + crossbowPositionOffset.z
    );
    updateCrossbowAxleLine();
  };
  const onBucklerPosSliderInput = (axis, slider) => {
    if (!slider) return;
    slider.addEventListener('input', () => {
      bucklerPos[axis] = Number(slider.value);
      applyBucklerPosition();
    });
  };
  const onMacePosSliderInput = (axis, slider) => {
    if (!slider) return;
    slider.addEventListener('input', () => {
      macePos[axis] = Number(slider.value);
      applyMacePosition();
    });
  };
  onBucklerPosSliderInput('x', bucklerPosSliderX);
  onBucklerPosSliderInput('y', bucklerPosSliderY);
  onBucklerPosSliderInput('z', bucklerPosSliderZ);
  onMacePosSliderInput('x', macePosSliderX);
  onMacePosSliderInput('y', macePosSliderY);
  onMacePosSliderInput('z', macePosSliderZ);
  applyBucklerPosition();
  applyMacePosition();
  applyCrossbowPosition();
  const desktopTargetOffset = new THREE.Vector3(-0.02, 0.16, 0.06);
  const mobileTargetOffset = new THREE.Vector3(-0.02, -0.08, 0.06);
  const targetOffset = desktopTargetOffset.clone();
  const desktopCameraOffset = new THREE.Vector3(-0.26, 2.95, 1.85);
  const mobileCameraOffset = new THREE.Vector3(-0.2, 2.62, 1.62);
  camera.position.set(
    center.x + desktopCameraOffset.x,
    center.y + desktopCameraOffset.y,
    center.z + desktopCameraOffset.z
  );
  camera.lookAt(center.x + targetOffset.x, center.y + targetOffset.y, center.z + targetOffset.z);

  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = false;
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.enableRotate = false;
  controls.autoRotate = false;
  controls.autoRotateSpeed = 0;
  controls.target.set(center.x + targetOffset.x, center.y + targetOffset.y, center.z + targetOffset.z);
  controls.update();

  const applyFraming = () => {
    const mobile = isMobileViewport();
    const cameraOffset = mobile ? mobileCameraOffset : desktopCameraOffset;
    const target = mobile ? mobileTargetOffset : desktopTargetOffset;
    const maceOffset = mobile ? mobileMacePositionOffset : desktopMacePositionOffset;
    const crossbowOffset = mobile ? mobileCrossbowPositionOffset : desktopCrossbowPositionOffset;
    macePositionOffset.copy(maceOffset);
    crossbowPositionOffset.copy(crossbowOffset);
    targetOffset.copy(target);
    bucklerSceneScale = mobile ? 0.86 : 0.69;
    maceSceneScale = mobile ? 0.68 : 0.65;
    crossbowSceneScale = mobile ? 0.65 : 0.62;

    camera.position.set(
      center.x + cameraOffset.x,
      center.y + cameraOffset.y,
      center.z + cameraOffset.z
    );
    controls.target.set(center.x + targetOffset.x, center.y + targetOffset.y, center.z + targetOffset.z);
    camera.lookAt(center.x + targetOffset.x, center.y + targetOffset.y, center.z + targetOffset.z);

    bucklerGroup.scale.setScalar(bucklerSceneScale);
    maceGroup.scale.setScalar(maceSceneScale);
    crossbowGroup.scale.setScalar(crossbowSceneScale);
    applyMacePosition();
    applyCrossbowPosition();
  };

  const resize = () => {
    const width = root.clientWidth || 1;
    const height = root.clientHeight || 1;
    const aspect = width / height;
    const baseFov = isMobileViewport() ? 42 : 36;
    camera.fov = baseFov / zoomFactor;
    camera.aspect = aspect;
    camera.updateProjectionMatrix();
    applyFraming();
    controls.update();
    renderer.setSize(width, height, false);
  };

  resize();
  if ('ResizeObserver' in window) {
    const observer = new ResizeObserver(resize);
    observer.observe(root);
  } else {
    window.addEventListener('resize', resize);
  }

  const fortifyMix = 1;
  const bucklerSpinSpeedZ = 0.12; // radians / second
  const maceSpinSpeedZ = 0.12; // radians / second
  let lastFrameTime = performance.now();
  const animate = () => {
    const now = performance.now();
    const dt = Math.min(0.05, (now - lastFrameTime) / 1000);
    lastFrameTime = now;

    for (let i = 0; i < faceMaterials.length; i += 1) {
      const mat = faceMaterials[i];
      mat.opacity = Math.min(0.74, mat.userData.baseOpacity * (1 + fortifyMix * 0.95));
      mat.envMapIntensity = mat.userData.baseEnvMapIntensity * (1 + fortifyMix * 0.58);
      mat.transmission = THREE.MathUtils.clamp(mat.userData.baseTransmission * (1 - fortifyMix * 0.38), 0.46, 1.0);
      mat.thickness = mat.userData.baseThickness * (1 + fortifyMix * 0.42);
    }
    edgeHighlightMaterial.opacity = Math.min(0.62, baseEdgeOpacity * (1 + fortifyMix * 2.1));
    glowShellMaterial.opacity = Math.min(0.42, baseGlowOpacity * (1 + fortifyMix * 1.4));
    bucklerGroup.scale.setScalar(bucklerSceneScale);
    maceGroup.scale.setScalar(maceSceneScale);
    crossbowGroup.scale.setScalar(crossbowSceneScale);
    bucklerGroup.rotation.z += bucklerSpinSpeedZ * dt;
    maceGroup.rotation.z += maceSpinSpeedZ * dt;
    crossbowGroup.rotateOnWorldAxis(crossbowSpinAxisWorld, maceSpinSpeedZ * dt);
    updateCrossbowAxleLine();

    if (buildEnabled && scenePhase === 'intro') {
      const buildTime = Math.max(0, now - buildStartAt);
      // Initial state: only shield builds in from the bottom.
      applyBuildPass(bucklerBuildOrder, buildTime, bucklerBuildStartMs, bucklerBuildDelayMs);
      for (let i = 0; i < maceCubes.length; i += 1) {
        maceCubes[i].visible = false;
      }
      for (let i = 0; i < crossbowCubes.length; i += 1) {
        crossbowCubes[i].visible = false;
      }
      if (buildTime >= bucklerBuildDurationMs + bucklerBuildStartMs) {
        scenePhase = 'ready';
      }
    } else if (scenePhase === 'unbuild_to_mace') {
      const elapsed = Math.max(0, now - phaseStartAt);
      if (elapsed <= bucklerUnbuildDurationMs) {
        // First unbuild shield.
        applyUnbuildPass(bucklerUnbuildOrder, elapsed, bucklerUnbuildDelayMs);
        for (let i = 0; i < maceCubes.length; i += 1) {
          maceCubes[i].visible = false;
        }
        for (let i = 0; i < crossbowCubes.length; i += 1) {
          crossbowCubes[i].visible = false;
        }
      } else {
        // Then build mace from handle seed.
        bucklerGroup.visible = false;
        crossbowGroup.visible = false;
        const maceElapsed = elapsed - bucklerUnbuildDurationMs;
        applyBuildPass(maceBuildOrder, maceElapsed, 0, maceBuildDelayMs);
        if (maceElapsed >= maceBuildDurationMs) {
          scenePhase = 'mace';
        }
      }
    } else if (scenePhase === 'unbuild_to_crossbow') {
      const elapsed = Math.max(0, now - phaseStartAt);
      if (elapsed <= maceUnbuildDurationMs) {
        applyUnbuildPass(maceUnbuildOrder, elapsed, maceUnbuildDelayMs);
        for (let i = 0; i < bucklerCubes.length; i += 1) {
          bucklerCubes[i].visible = false;
        }
        for (let i = 0; i < crossbowCubes.length; i += 1) {
          crossbowCubes[i].visible = false;
        }
      } else {
        maceGroup.visible = false;
        bucklerGroup.visible = false;
        const crossbowElapsed = elapsed - maceUnbuildDurationMs;
        applyBuildPass(crossbowBuildOrder, crossbowElapsed, 0, crossbowBuildDelayMs);
        if (crossbowElapsed >= crossbowBuildDurationMs) {
          scenePhase = 'crossbow';
        }
      }
    } else if (scenePhase === 'unbuild_to_buckler') {
      const elapsed = Math.max(0, now - phaseStartAt);
      if (elapsed <= crossbowUnbuildDurationMs) {
        applyUnbuildPass(crossbowUnbuildOrder, elapsed, crossbowUnbuildDelayMs);
        for (let i = 0; i < bucklerCubes.length; i += 1) {
          bucklerCubes[i].visible = false;
        }
        for (let i = 0; i < maceCubes.length; i += 1) {
          maceCubes[i].visible = false;
        }
      } else {
        maceGroup.visible = false;
        crossbowGroup.visible = false;
        const bucklerElapsed = elapsed - crossbowUnbuildDurationMs;
        applyBuildPass(bucklerBuildOrder, bucklerElapsed, 0, bucklerBuildDelayMs);
        if (bucklerElapsed >= bucklerBuildDurationMs) {
          scenePhase = 'ready';
        }
      }
    } else if (scenePhase === 'mace') {
      bucklerGroup.visible = false;
      maceGroup.visible = true;
      for (let i = 0; i < maceCubes.length; i += 1) {
        const cube = maceCubes[i];
        cube.visible = true;
        cube.scale.setScalar(1);
        setCubeAlpha(cube, 1);
      }
    } else if (scenePhase === 'crossbow') {
      bucklerGroup.visible = false;
      maceGroup.visible = false;
      crossbowGroup.visible = true;
      for (let i = 0; i < crossbowCubes.length; i += 1) {
        const cube = crossbowCubes[i];
        cube.visible = true;
        cube.scale.setScalar(1);
        setCubeAlpha(cube, 1);
      }
    }
    controls.update();
    renderer.render(scene, camera);
    if (canvas.style.opacity !== '1') canvas.style.opacity = '1';
    requestAnimationFrame(animate);
  };
  animate();
</script>
