<div
  class="{{ include.class }} relative overflow-hidden"
  data-ops-crossbow
  style="height: {{ include.height | default: '320px' }};"
>
  <canvas
    class="block h-full w-full"
    style="opacity: 0; -webkit-mask-image: radial-gradient(120% 112% at 50% 50%, rgba(0,0,0,1) 62%, rgba(0,0,0,0.92) 74%, rgba(0,0,0,0.48) 85%, rgba(0,0,0,0.1) 93%, rgba(0,0,0,0) 100%); mask-image: radial-gradient(120% 112% at 50% 50%, rgba(0,0,0,1) 62%, rgba(0,0,0,0.92) 74%, rgba(0,0,0,0.48) 85%, rgba(0,0,0,0.1) 93%, rgba(0,0,0,0) 100%);"
  ></canvas>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.167.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.167.1/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

  const root = document.querySelector('[data-ops-crossbow]:not([data-three-mounted])');
  if (!root) throw new Error('ops-crossbow mount target not found');

  root.setAttribute('data-three-mounted', 'true');
  const canvas = root.querySelector('canvas');
  canvas.style.transition = 'opacity 300ms ease-out';

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  const scene = new THREE.Scene();
  const includeZoom = Number({{ include.zoom | default: 1 }});
  const zoomFactor = Number.isFinite(includeZoom) && includeZoom > 0 ? includeZoom : 1;
  const camera = new THREE.PerspectiveCamera(36, 1, 0.1, 100);

  scene.background = null;
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.28;
  renderer.physicallyCorrectLights = true;

  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  const envRT = pmremGenerator.fromScene(new RoomEnvironment(), 0.04);
  scene.environment = envRT.texture;
  pmremGenerator.dispose();

  scene.add(new THREE.AmbientLight(0xffffff, 0.65));
  const keyLight = new THREE.DirectionalLight(0xbfe3ff, 2.8);
  keyLight.position.set(3, 5, 4);
  scene.add(keyLight);
  const rimLight = new THREE.DirectionalLight(0xffffff, 2.2);
  rimLight.position.set(-4, 2.5, -3);
  scene.add(rimLight);

  // Shared cube styling baseline (same family as shield/mace component).
  const boxGeometry = new THREE.BoxGeometry(0.12, 0.1662, 0.12);
  const edgeGeometry = new THREE.EdgesGeometry(boxGeometry);
  const edgeHighlightMaterial = new THREE.LineBasicMaterial({
    color: 0xe6edf7,
    transparent: true,
    opacity: 0.42,
    toneMapped: false
  });
  const glowShellMaterial = new THREE.MeshBasicMaterial({
    color: 0xd6e2f0,
    transparent: true,
    opacity: 0.12,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    depthWrite: false,
    toneMapped: false
  });

  const labelTextureCache = new Map();
  const materialCache = new Map();

  const buildLabelTexture = (label) => {
    const c = document.createElement('canvas');
    c.width = 128;
    c.height = 128;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 128, 128);
    ctx.fillStyle = 'rgba(112, 122, 136, 0.16)';
    ctx.fillRect(0, 0, 128, 128);
    const texture = new THREE.CanvasTexture(c);
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.needsUpdate = true;
    return texture;
  };

  const getLabelTexture = (label) => {
    if (!labelTextureCache.has(label)) labelTextureCache.set(label, buildLabelTexture(label));
    return labelTextureCache.get(label);
  };

  const getFaceMaterial = (label) => {
    if (!materialCache.has(label)) {
      materialCache.set(label, new THREE.MeshPhysicalMaterial({
        color: 0xb7c2cf,
        transparent: true,
        opacity: 0.94,
        map: getLabelTexture(label),
        metalness: 0.86,
        roughness: 0.2,
        transmission: 0.08,
        thickness: 0.22,
        ior: 1.5,
        clearcoat: 0.65,
        clearcoatRoughness: 0.08,
        attenuationColor: 0x8f9aab,
        attenuationDistance: 2.2,
        envMapIntensity: 2.35
      }));
    }
    return materialCache.get(label);
  };

  const createBox = ({ position = [0, 0, 0] } = {}) => {
    const mesh = new THREE.Mesh(boxGeometry, [
      getFaceMaterial('s1').clone(),
      getFaceMaterial('s2').clone(),
      getFaceMaterial('t').clone(),
      getFaceMaterial('b').clone(),
      getFaceMaterial('s3').clone(),
      getFaceMaterial('s4').clone()
    ]);
    mesh.position.set(position[0], position[1], position[2]);
    const edgeLines = new THREE.LineSegments(edgeGeometry, edgeHighlightMaterial);
    edgeLines.renderOrder = 2;
    mesh.add(edgeLines);
    const glowShell = new THREE.Mesh(boxGeometry, glowShellMaterial);
    glowShell.scale.set(1.12, 1.12, 1.12);
    glowShell.renderOrder = 0;
    mesh.add(glowShell);
    return mesh;
  };

  const crossbowGroup = new THREE.Group();
  const matrix = [
    '00000000000000000',
    '00000000011110000',
    '00011001111011000',
    '00100111100000000',
    '00101110000000000',
    '00010111000000000',
    '00011111110000000',
    '00110111100000000',
    '00110011111000000',
    '01100011111100000',
    '01100000111110000',
    '01000000011110000',
    '01100000001111000',
    '00100000000011100',
    '00000000000001110',
    '00000000000000100',
    '00000000000000000'
  ];

  const pitch = 0.125;
  const matrixCenterX = 8; // column index
  const matrixCenterZ = 9; // row index
  const yBase = 0;
  const stringLayerY = 0.17;

  for (let row = 0; row < matrix.length; row += 1) {
    const cells = matrix[row];
    for (let col = 0; col < cells.length; col += 1) {
      if (cells[col] !== '1') continue;
      const x = (col - matrixCenterX) * pitch;
      const z = (row - matrixCenterZ) * pitch;
      const cube = createBox({ position: [x, yBase, z] });
      crossbowGroup.add(cube);
    }
  }

  // Elevated string layer (1-based coordinates from design spec).
  const stringCoords = [
    [4, 13],
    [5, 12],
    [6, 11],
    [7, 10],
    [8, 9],
    [9, 8],
    [10, 7],
    [11, 6],
    [12, 5],
    [13, 4]
  ];

  for (let i = 0; i < stringCoords.length; i += 1) {
    const [x1, y1] = stringCoords[i];
    const col = x1 - 1;
    const row = y1 - 1;
    const x = (col - matrixCenterX) * pitch;
    const z = (row - matrixCenterZ) * pitch;
    const cube = createBox({ position: [x, yBase + stringLayerY, z] });
    crossbowGroup.add(cube);
  }

  // Pivot for drag-rotate is explicitly the matrix center point (8,8) => world origin.
  crossbowGroup.position.set(0, 0, 0);
  scene.add(crossbowGroup);

  const isMobileViewport = () => window.matchMedia('(max-width: 767px)').matches;
  const desktopCameraOffset = new THREE.Vector3(0, 3.25, 0.001);
  const mobileCameraOffset = new THREE.Vector3(0, 3.55, 0.001);
  const target = new THREE.Vector3(0, 0, 0);

  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.enableRotate = true;
  controls.autoRotate = false;
  controls.minDistance = 1.6;
  controls.maxDistance = 6.5;
  controls.minPolarAngle = 0.03;
  controls.maxPolarAngle = Math.PI - 0.03;

  const applyFraming = () => {
    const mobile = isMobileViewport();
    const offset = mobile ? mobileCameraOffset : desktopCameraOffset;
    camera.position.set(target.x + offset.x, target.y + offset.y, target.z + offset.z);
    controls.target.set(target.x, target.y, target.z);
    camera.lookAt(target.x, target.y, target.z);
    controls.update();
  };

  const resize = () => {
    const width = root.clientWidth || 1;
    const height = root.clientHeight || 1;
    camera.fov = (isMobileViewport() ? 35 : 30) / zoomFactor;
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    applyFraming();
    renderer.setSize(width, height, false);
  };

  resize();
  if ('ResizeObserver' in window) {
    const observer = new ResizeObserver(resize);
    observer.observe(root);
  } else {
    window.addEventListener('resize', resize);
  }

  const animate = () => {
    controls.update();
    renderer.render(scene, camera);
    if (canvas.style.opacity !== '1') canvas.style.opacity = '1';
    requestAnimationFrame(animate);
  };

  animate();
</script>
