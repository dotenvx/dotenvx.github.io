<div>
  <div id="nav-shell" class="w-full bg-transparent transition-colors duration-200{% if page.url == '/' or page.url == '/index.html' %} nav-enter{% endif %}">
  <div class="mx-auto w-full max-w-7xl px-6">
    <div class="mx-auto relative flex w-full items-center transition">
      <div class="flex-shrink-0 flex items-center">
        <a href="/" class="inline-flex items-center py-5 no-underline hover:no-underline">
          <img src="/assets/img/logo-dotenvx.svg" class="flex dark:hidden h-4" />
          <img src="/assets/img/logo-dotenvx-dark.svg" class="hidden dark:flex h-4" />
        </a>
      </div>
      <div class="hidden md:flex absolute left-1/2 -translate-x-1/2 items-center gap-8">
        <a href="https://github.com/dotenvx/dotenvx" class="inline-flex items-center py-5 text-xs md:text-sm font-semibold text-zinc-500 dark:text-zinc-300/90 no-underline hover:no-underline hover:text-zinc-700 dark:hover:text-zinc-100 transition-colors duration-200 whitespace-nowrap">
          <span class="inline-flex items-center gap-0.5"><span>GitHub</span><span>★</span><span>5k</span></span>
        </a>
        <a href="/dotenvx.pdf" target="_blank" rel="noopener noreferrer" class="inline-flex items-center py-5 text-xs md:text-sm font-semibold text-zinc-500 dark:text-zinc-300/90 no-underline hover:no-underline hover:text-zinc-700 dark:hover:text-zinc-100 transition-colors duration-200 whitespace-nowrap">
          Whitepaper
        </a>
        <a href="/docs" class="inline-flex items-center py-5 text-xs md:text-sm font-semibold text-zinc-500 dark:text-zinc-300/90 no-underline hover:no-underline hover:text-zinc-700 dark:hover:text-zinc-100 transition-colors duration-200 whitespace-nowrap">Docs</a>
      </div>
      <button
        type="button"
        id="mobile-nav-toggle"
        class="md:hidden fixed top-1.5 right-6 h-12 w-12 inline-flex items-center justify-center rounded-xl text-zinc-300 hover:text-zinc-100 hover:bg-zinc-900 transition-colors duration-200"
        style="z-index: 110;"
        aria-expanded="false"
        aria-label="Toggle navigation menu"
      >
        <svg id="mobile-nav-icon-open" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h16M4 17h16" />
        </svg>
        <svg id="mobile-nav-icon-close" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 6l12 12M18 6l-12 12" />
        </svg>
      </button>
      <div class="hidden md:flex ml-auto items-center justify-end gap-x-3 md:gap-x-8">
        <a href="/login" class="inline-flex items-center py-4 text-xs md:text-sm font-semibold text-zinc-500 dark:text-zinc-300/90 no-underline hover:no-underline hover:text-zinc-700 dark:hover:text-zinc-100 transition-colors duration-200 whitespace-nowrap" data-umami-event="Login link">
          Log In
        </a>
        <a href="/docs/quickstart" class="btn-primary text-xs md:text-sm whitespace-nowrap" data-umami-event="Get Started link">
          Get Started
        </a>
      </div>
    </div>
  </div>
  </div>

  <div id="mobile-nav-overlay" class="hidden md:hidden fixed inset-0 z-[100] bg-zinc-950 overflow-y-auto border-t border-yellow-300 rounded-t-lg">
    <div class="mx-auto w-full max-w-7xl px-6 pt-20 pb-10 min-h-screen">
      <button
        type="button"
        id="mobile-nav-close"
        class="fixed top-1.5 right-6 z-[120] h-12 w-12 inline-flex items-center justify-center rounded-xl text-zinc-300 hover:text-zinc-100 hover:bg-zinc-900 transition-colors duration-200"
        aria-label="Close navigation menu"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 6l12 12M18 6l-12 12" />
        </svg>
      </button>
      <div class="space-y-3">
        <a href="/docs/quickstart" class="mobile-nav-link btn-primary w-full text-lg">Get Started</a>
        <a href="/login" class="mobile-nav-link flex w-full items-center justify-center py-3 text-lg font-semibold !text-zinc-400 no-underline hover:no-underline hover:!text-zinc-100 transition-colors duration-200" data-umami-event="Documentation link">Log In</a>
      </div>

      <nav class="mt-8 flex flex-col divide-y divide-zinc-800 border-y border-zinc-800">
        <a href="https://github.com/dotenvx/dotenvx" class="mobile-nav-link flex items-center justify-between py-5 text-base font-semibold !text-zinc-400 no-underline hover:no-underline hover:!text-zinc-100 transition-colors duration-200">
          <span class="inline-flex items-center gap-0.5"><span>GitHub</span><span>★</span><span>5k</span></span>
          <span aria-hidden="true" class="text-zinc-500 text-base leading-none">&rarr;</span>
        </a>
        <a href="/dotenvx.pdf" target="_blank" rel="noopener noreferrer" class="mobile-nav-link flex items-center justify-between py-5 text-base font-semibold !text-zinc-400 no-underline hover:no-underline hover:!text-zinc-100 transition-colors duration-200">
          <span>Whitepaper</span>
          <span aria-hidden="true" class="text-zinc-500 text-base leading-none">&rarr;</span>
        </a>
        <a href="/docs" class="mobile-nav-link flex items-center justify-between py-5 text-base font-semibold !text-zinc-400 no-underline hover:no-underline hover:!text-zinc-100 transition-colors duration-200">
          <span>Docs</span>
          <span aria-hidden="true" class="text-zinc-500 text-base leading-none">&rarr;</span>
        </a>
      </nav>
    </div>
  </div>
</div>
<script>
  (() => {
    const toggleButton = document.getElementById('mobile-nav-toggle');
    const closeButton = document.getElementById('mobile-nav-close');
    const overlay = document.getElementById('mobile-nav-overlay');
    const openIcon = document.getElementById('mobile-nav-icon-open');
    const closeIcon = document.getElementById('mobile-nav-icon-close');
    const navSticky = document.getElementById('nav-sticky');
    const navShell = document.getElementById('nav-shell');
    if (!toggleButton || !overlay || toggleButton.dataset.navInit === 'true') return;

    // Keep overlay at body root to avoid sticky/stacking-context issues on mobile.
    if (overlay.parentElement !== document.body) {
      document.body.appendChild(overlay);
    }

    const setOpen = (isOpen) => {
      overlay.classList.toggle('hidden', !isOpen);
      toggleButton.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      openIcon?.classList.toggle('hidden', isOpen);
      closeIcon?.classList.toggle('hidden', !isOpen);
      document.body.classList.toggle('overflow-hidden', isOpen);
    };

    toggleButton.addEventListener('click', () => {
      const isOpen = overlay.classList.contains('hidden');
      setOpen(isOpen);
    });

    overlay.addEventListener('click', (event) => {
      if (event.target === overlay) setOpen(false);
    });

    closeButton?.addEventListener('click', () => setOpen(false));

    overlay.querySelectorAll('.mobile-nav-link').forEach((link) => {
      link.addEventListener('click', () => setOpen(false));
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') setOpen(false);
    });

    const setNavScrolled = () => {
      if (!navSticky || !navShell) return;
      if (window.scrollY > 72) {
        navShell.classList.remove('bg-transparent');
        navShell.classList.add('bg-zinc-950/80');
        navShell.classList.add('backdrop-blur-md');
        navSticky.classList.add('border-b-zinc-800');
        navSticky.classList.remove('border-b-transparent');
      } else {
        navShell.classList.add('bg-transparent');
        navShell.classList.remove('bg-zinc-950/80');
        navShell.classList.remove('backdrop-blur-md');
        navSticky.classList.remove('border-b-zinc-800');
        navSticky.classList.add('border-b-transparent');
      }
    };

    window.addEventListener('scroll', setNavScrolled, { passive: true });
    setNavScrolled();

    toggleButton.dataset.navInit = 'true';
  })();
</script>
