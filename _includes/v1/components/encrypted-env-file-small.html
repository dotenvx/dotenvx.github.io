<div class="terminal-hero-card terminal-hero-card-premium mx-auto bg-[#11100d] text-[#d7d1c1] font-mono text-sm rounded-xl border shadow-2xl overflow-hidden" style="border-color: rgba(165, 128, 64, 0.58);" data-dotenvx-terminal-demo>
  <div class="flex items-center justify-between px-3 py-2 bg-[#1b1710] border-b" style="border-color: rgba(165, 128, 64, 0.40);">
    <div class="flex items-center gap-1">
      <span class="h-2 w-2 rounded-full bg-[#d9b56a]"></span>
      <span class="h-2 w-2 rounded-full bg-[#bb944f]"></span>
      <span class="h-2 w-2 rounded-full bg-[#9a753c]"></span>
    </div>
    <span class="text-[11px] tracking-wide text-[#b7a98a]">npm i @dotenvx/dotenvx</span>
  </div>

  <pre class="dotenvx-live-terminal px-5 py-5 leading-relaxed whitespace-pre overflow-auto" aria-live="polite"></pre>
</div>

<style>
  .dotenvx-live-terminal {
    height: 22rem;
    margin: 0;
    scrollbar-width: thin;
  }

  .dotenvx-live-terminal .dim { color: #9b8f74; }
  .dotenvx-live-terminal .cmd { color: #f0db9c; }
  .dotenvx-live-terminal .ok { color: #7ce38f; }
  .dotenvx-live-terminal .title { color: #cdaa62; }
  .dotenvx-live-terminal .key { color: #d3d0c6; }
  .dotenvx-live-terminal .val { color: #d3bc66; }
  .dotenvx-live-terminal .cursor {
    display: inline-block;
    width: 0;
    height: 1.02em;
    margin-left: 0;
    border-left: 2px solid #f0db9c;
    animation: dotenvx-caret 920ms step-end infinite;
    vertical-align: -0.14em;
  }
  .dotenvx-live-terminal .vim-frame {
    --vim-editor-bg: rgba(10, 9, 7, 0.68);
    display: block;
    position: relative;
    margin-top: 22px;
    box-sizing: border-box;
    max-width: 100%;
    border: 1px solid rgba(205, 170, 98, 0.45);
    border-radius: 6px;
    padding: 16px 16px 10px 12px;
    background: var(--vim-editor-bg);
    white-space: pre-wrap;
    overflow: visible;
    overflow-wrap: anywhere;
    word-break: break-word;
    box-shadow:
      inset 0 0 0 1px rgba(255, 223, 158, 0.08),
      0 8px 20px rgba(0, 0, 0, 0.32);
  }
  .dotenvx-live-terminal .vim-tab {
    position: absolute;
    top: -25px;
    left: 14px;
    display: inline-block;
    padding: 6px 12px 7px;
    border: 1px solid rgba(205, 170, 98, 0.58);
    border-bottom: 1px solid rgba(205, 170, 98, 0.45);
    border-radius: 6px 6px 0 0;
    background: var(--vim-editor-bg);
    color: #b7a98a;
    font-size: 10px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: 0;
    box-shadow: none;
  }
  .dotenvx-live-terminal .vim-frame .val {
    overflow-wrap: anywhere;
    word-break: break-word;
  }
  .dotenvx-live-terminal .vim-comment { color: #7f8f7b; }
  .dotenvx-live-terminal .vim-js-fn { color: #7fb8d8; }
  .dotenvx-live-terminal .vim-js-str { color: #d7c56f; }
  .dotenvx-live-terminal .vim-js-var { color: #c89ae0; }

  @keyframes dotenvx-caret {
    0%, 45% { opacity: 1; }
    46%, 100% { opacity: 0; }
  }

  @media (max-width: 767px) {
    .dotenvx-live-terminal {
      height: 19rem;
      font-size: 12px;
      line-height: 1.5;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .dotenvx-live-terminal .cursor {
      animation: none;
      opacity: 1;
    }
  }
</style>

<script>
  (() => {
    const demos = document.querySelectorAll("[data-dotenvx-terminal-demo]");
    if (!demos.length) return;

    const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    const indexJsLines = [
      "// index.js",
      "console.log(`Hello ${process.env.HELLO}`)"
    ];
    const encryptedFileLines = [
      '# .env – encrypted with dotenvx',
      'HELLO="encrypted:BIWFIR+r/iRY0lLEjUjCHLgzLs6mKg3vcaz39xnCDyArfqWZpFU8NN5xVnf68hYRhPZrzNJIaUr33TCQdD0RgLeIgjXpltN+hmiuH/5thsMLbfFdxCbIsiqhOv6PcmY2yCgxkIY6"'
    ];

    const escapeHtml = (value) =>
      value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");

    const renderVimLine = (line, fileName) => {
      if (!line) return "";
      if (fileName.endsWith(".js")) {
        if (line.startsWith("//")) {
          return `<span class=\"vim-comment\">${escapeHtml(line)}</span>`;
        }
        if (line === "console.log(`Hello ${process.env.HELLO}`)") {
          return [
            '<span class="vim-js-fn">console.log</span>(',
            '<span class="vim-js-str">`Hello </span>',
            '<span class="vim-js-var">${process.env.HELLO}</span>',
            '<span class="vim-js-str">`</span>',
            ")"
          ].join("");
        }
      }
      if (line.startsWith("#/") || line.startsWith("# .env")) {
        return `<span class=\"dim\">${escapeHtml(line)}</span>`;
      }
      const equalsIndex = line.indexOf("=");
      if (equalsIndex === -1) return escapeHtml(line);
      const key = line.slice(0, equalsIndex);
      const val = line.slice(equalsIndex + 1);
      return `<span class=\"key\">${escapeHtml(key)}</span>=<span class=\"val\">${escapeHtml(val)}</span>`;
    };

    const renderVim = (fileName, lines, status) => {
      const body = lines
        .map((line) => {
          return renderVimLine(line, fileName) || "&nbsp;";
        })
        .join("\n");

      return [
        body,
        "",
        `<span class=\"dim\">${escapeHtml(status)}</span>`
      ].join("\n");
    };

    demos.forEach((demo) => {
      if (demo.dataset.demoReady === "1") return;
      demo.dataset.demoReady = "1";

      const screen = demo.querySelector(".dotenvx-live-terminal");
      if (!screen) return;

      const state = {
        shellLines: [],
        mode: "shell",
        vimMarkup: "",
        activeCommand: "",
        vimLines: [],
        vimFileName: ".env",
        showPrompt: false
      };

      const render = () => {
        if (state.mode === "vim") {
          screen.innerHTML = `<span class=\"vim-frame\"><span class=\"vim-tab\">${escapeHtml(state.vimFileName)}</span>${state.vimMarkup}</span>`;
          return;
        }

        const lines = [...state.shellLines];
        if (state.activeCommand) {
          lines.push(`<span class=\"cmd\">$ ${escapeHtml(state.activeCommand)}</span><span class=\"cursor\"></span>`);
        } else if (state.showPrompt) {
          lines.push('<span class="cmd">$ </span><span class="cursor"></span>');
        }

        screen.innerHTML = lines.join("\n");
        screen.scrollTop = screen.scrollHeight;
      };

      const pushLine = (line) => {
        state.shellLines.push(line);
        if (state.shellLines.length > 32) state.shellLines = state.shellLines.slice(-32);
        render();
      };

      const typeCommand = async (command) => {
        state.mode = "shell";
        state.showPrompt = true;
        state.activeCommand = "";
        render();
        for (const ch of command) {
          state.activeCommand += ch;
          render();
          await wait(52 + Math.floor(Math.random() * 36));
        }
        await wait(210);
        pushLine(`<span class=\"cmd\">$ ${escapeHtml(command)}</span>`);
        state.showPrompt = false;
        state.activeCommand = "";
        render();
      };

      const runCommand = async (command, outputLines, pause = 900, options = {}) => {
        const { clearAfter = false } = options;
        await typeCommand(command);
        if (clearAfter) {
          await wait(120);
          resetTerminal();
          await wait(pause);
          return;
        }
        for (const line of outputLines) {
          pushLine(line);
          await wait(220);
        }
        state.showPrompt = true;
        render();
        await wait(pause);
        state.showPrompt = false;
        render();
      };

      const showVim = async (fileName, lines, status, duration = 2200) => {
        state.mode = "vim";
        state.vimFileName = fileName;
        state.vimLines = lines;
        state.vimMarkup = renderVim(state.vimFileName, state.vimLines, status);
        render();
        await wait(duration);
      };

      const typeInVim = async (fileName, values, preserveExisting = false) => {
        state.mode = "vim";
        state.vimFileName = fileName;
        if (!preserveExisting) {
          state.vimLines = [""];
        } else if (!state.vimLines.length) {
          state.vimLines = [""];
        }

        const linesToType = Array.isArray(values) ? values : [values];
        for (let i = 0; i < linesToType.length; i += 1) {
          if (preserveExisting || i > 0) state.vimLines.push("");
          const lineIndex = preserveExisting ? state.vimLines.length - 1 : i;
          for (const ch of linesToType[i]) {
            state.vimLines[lineIndex] += ch;
            state.vimMarkup = renderVim(state.vimFileName, state.vimLines, `"${fileName}" [New]  ${lineIndex + 1},1  -- INSERT --`);
            render();
            await wait(62 + Math.floor(Math.random() * 44));
          }
          await wait(150);
        }
      };

      const exitVim = async (status) => {
        state.mode = "vim";
        state.vimMarkup = renderVim(state.vimFileName, state.vimLines, status);
        render();
        await wait(460);
      };

      const closeVim = async () => {
        state.mode = "shell";
        render();
        await wait(420);
      };

      const resetTerminal = () => {
        state.shellLines = [];
        state.mode = "shell";
        state.vimMarkup = "";
        state.activeCommand = "";
        state.vimLines = [];
        state.showPrompt = false;
        render();
      };

      const idleAtPrompt = async (ms) => {
        state.mode = "shell";
        state.showPrompt = true;
        state.activeCommand = "";
        render();
        await wait(ms);
        state.showPrompt = false;
        render();
      };

      const loop = async () => {
        while (document.body.contains(demo)) {
          resetTerminal();
          await idleAtPrompt(2700);
          await runCommand("npm install @dotenvx/dotenvx", [
            "<span class=\"ok\">dotenvx installed.</span>"
          ], 950);
          await runCommand("vim .env", [], 380);
          await showVim(".env", ["# .env"], "\".env\" [New]  1,1  -- INSERT --", 500);
          await typeInVim(".env", 'HELLO="World"', true);
          await wait(750);
          await exitVim("\".env\" [New]  2,13  :wq");
          await closeVim();
          await runCommand("dotenvx encrypt", [
            "<span class=\"ok\">◈ encrypted (.env) + key (.env.keys)</span>"
          ], 1050);
          await runCommand("vim .env", [], 300);
          await showVim(".env", encryptedFileLines, "\".env\"  2L, 301B", 3600);
          await exitVim("\".env\"  2L, 301B  :q");
          await closeVim();
          await runCommand("vim index.js", [], 320);
          await showVim("index.js", [], "\"index.js\" [New]  0,0  -- INSERT --", 450);
          await typeInVim("index.js", indexJsLines);
          await wait(700);
          await exitVim("\"index.js\" [New]  2,41  :wq");
          await closeVim();
          await runCommand("dotenvx run -- node index.js", [
            "<span class=\"val\">[dotenvx@1.57.0] injecting env (1) from .env</span>",
            "Hello World"
          ], 1200);

          await runCommand("clear", [], 240, { clearAfter: true });
          await idleAtPrompt(700);
          await runCommand("vim .env.production", [], 320);
          await showVim(".env.production", ["# .env.production"], "\".env.production\" [New]  1,1  -- INSERT --", 420);
          await typeInVim(".env.production", 'HELLO="Production"', true);
          await wait(650);
          await exitVim("\".env.production\" [New]  2,18  :wq");
          await closeVim();
          await runCommand("dotenvx encrypt -f .env.production", [
            "<span class=\"ok\">◈ encrypted (.env.production) + key (.env.keys)</span>"
          ], 980);
          await runCommand("dotenvx run -f .env.production -- node index.js", [
            "<span class=\"val\">[dotenvx@1.57.0] injecting env (1) from .env.production</span>",
            "Hello Production"
          ], 1350);
          await runCommand("clear", [], 240, { clearAfter: true });
          await idleAtPrompt(700);
          await runCommand("vim .env.ci", [], 320);
          await showVim(".env.ci", ["# .env.ci"], "\".env.ci\" [New]  1,1  -- INSERT --", 420);
          await typeInVim(".env.ci", 'HELLO="CI"', true);
          await wait(650);
          await exitVim("\".env.ci\" [New]  2,11  :wq");
          await closeVim();
          await runCommand("dotenvx encrypt -f .env.ci", [
            "<span class=\"ok\">◈ encrypted (.env.ci) + key (.env.keys)</span>"
          ], 980);
          await runCommand("dotenvx run -f .env.ci -- node index.js", [
            "<span class=\"val\">[dotenvx@1.57.0] injecting env (1) from .env.ci</span>",
            "Hello CI"
          ], 1350);
          pushLine("<span class=\"dim\"># restarting demo...</span>");
          state.showPrompt = true;
          render();
          await wait(1500);
        }
      };

      render();
      loop();
    });
  })();
</script>
