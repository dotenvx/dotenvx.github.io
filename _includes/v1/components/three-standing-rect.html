<div
  class="{{ include.class }}"
  data-three-standing-rect
  style="height: {{ include.height | default: '320px' }};"
>
  <canvas class="block h-full w-full"></canvas>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.167.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.167.1/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

  const root = document.querySelector('[data-three-standing-rect]:not([data-three-mounted])');
  if (!root) {
    throw new Error('three-standing-rect mount target not found');
  }

  root.setAttribute('data-three-mounted', 'true');
  const canvas = root.querySelector('canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  const scene = new THREE.Scene();
  const minFrustumSize = 3.0;
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
  scene.background = new THREE.Color(0x000000);

  camera.up.set(0, 1, 0);
  camera.position.set(0, 6, 0.001);
  camera.lookAt(0, 0.74, 0);

  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.25;
  renderer.physicallyCorrectLights = true;

  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  const envRT = pmremGenerator.fromScene(new RoomEnvironment(), 0.04);
  scene.environment = envRT.texture;
  pmremGenerator.dispose();

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
  scene.add(ambientLight);

  const keyLight = new THREE.DirectionalLight(0xbfe3ff, 2.8);
  keyLight.position.set(3, 5, 4);
  scene.add(keyLight);

  const rimLight = new THREE.DirectionalLight(0xffffff, 2.2);
  rimLight.position.set(-4, 2.5, -3);
  scene.add(rimLight);

  const rectGeometry = new THREE.BoxGeometry(0.12, 0.1662, 0.12);
  const labelTextureCache = new Map();
  const materialCache = new Map();

  const buildLabelTexture = (label) => {
    const c = document.createElement('canvas');
    c.width = 128; c.height = 128;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 128, 128);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, 128, 128);
    ctx.fillStyle = '#000';
    ctx.font = '500 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 64, 64);
    const texture = new THREE.CanvasTexture(c);
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.needsUpdate = true;
    return texture;
  };

  const getLabelTexture = (label) => {
    if (!labelTextureCache.has(label)) {
      labelTextureCache.set(label, buildLabelTexture(label));
    }
    return labelTextureCache.get(label);
  };

  const getFaceMaterial = (label) => {
    if (!materialCache.has(label)) {
      materialCache.set(label, new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        map: getLabelTexture(label),
        metalness: 0.0,
        roughness: 0.02,
        transmission: 1.0,
        thickness: 1.6,
        ior: 1.5,
        clearcoat: 1.0,
        clearcoatRoughness: 0.0,
        envMapIntensity: 2.2
      }));
    }
    return materialCache.get(label);
  };

  const createStandingRect = ({
    position = [0, 0.74, 0],
    rotation = [0, 0, 0],
    labels = { px: 's1', nx: 's2', py: 't', ny: 'b', pz: 's3', nz: 's4' }
  } = {}) => {
    // BoxGeometry face order: +x, -x, +y (top), -y (bottom), +z, -z
    const mesh = new THREE.Mesh(rectGeometry, [
      getFaceMaterial(labels.px),
      getFaceMaterial(labels.nx),
      getFaceMaterial(labels.py),
      getFaceMaterial(labels.ny),
      getFaceMaterial(labels.pz),
      getFaceMaterial(labels.nz)
    ]);
    mesh.position.set(position[0], position[1], position[2]);
    mesh.rotation.set(rotation[0], rotation[1], rotation[2]);
    return mesh;
  };

  const patternRows = [
    'Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб',
    'Рђб Рђб Рђб Рђб Рќа Рќа Рќа Рќа Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб',
    'Рђб Рђб Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб',
    'Рђб Рќа Рќа Рќа Рђб Рђб Рђб Рќа Рќа Рќа Рђб Рђб Рђб Рќа Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб',
    'Рђб Рќа Рќа Рђб Рђб Рђб Рђб Рђб Рђб Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рђб',
    'Рђб Рќа Рќа Рђб Рђб Рќа Рђб Рђб Рђб Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рќа Рђб Рђб',
    'Рђб Рќа Рќа Рђб Рђб Рђб Рђб Рќа Рќа Рќа Рђб Рђб Рђб Рќа Рђб Рђб Рђб Рђб Рќа Рќа Рќа Рќа Рќа Рђб Рђб',
    'Рђб Рќа Рќа Рќа Рђб Рђб Рќа Рќа Рќа Рђб Рђб Рђб Рђб Рђб Рђб Рќа Рђб Рђб Рќа Рќа Рђб Рђб Рќа Рђб Рђб',
    'Рђб Рђб Рќа Рќа Рќа Рќа Рќа Рќа Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рќа Рќа Рђб Рђб Рќа Рђб Рђб',
    'Рђб Рђб Рђб Рќа Рќа Рќа Рќа Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб',
    'Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб Рђб'
  ];

  const grid = patternRows.map((row) => row.trim().split(/\s+/));
  const rowCount = grid.length;
  const colCount = grid[0].length;
  const pitch = 0.123;
  const centerX = 0;
  const centerZ = 0;
  const startX = centerX - ((colCount - 1) * pitch) / 2;
  const startZ = centerZ - ((rowCount - 1) * pitch) / 2;

  const rectGroup = new THREE.Group();
  for (let r = 0; r < rowCount; r += 1) {
    for (let c = 0; c < colCount; c += 1) {
      if (grid[r][c] !== 'Рќа') continue;
      const x = startX + c * pitch;
      const z = startZ + r * pitch;
      rectGroup.add(createStandingRect({ position: [x, 0.74, z] }));
    }
  }
  rectGroup.rotation.y = Math.PI;
  scene.add(rectGroup);

  const keyBounds = new THREE.Box3().setFromObject(rectGroup);
  const keyCenter = new THREE.Vector3();
  const keySize = new THREE.Vector3();
  keyBounds.getCenter(keyCenter);
  keyBounds.getSize(keySize);
  const keyCenterY = 0.74;
  const fitFrustumSize = Math.max(keySize.x, keySize.z) * 1.18;

  camera.position.set(keyCenter.x - 2.3, keyCenterY + 3.6, keyCenter.z - 2.1);
  camera.lookAt(keyCenter.x, keyCenterY, keyCenter.z);

const resize = () => {
    const width = root.clientWidth || 1;
    const height = root.clientHeight || 1;
    const aspect = width / height;
    const frustumSize = Math.max(minFrustumSize, fitFrustumSize);

    camera.left = -0.5 * frustumSize * aspect;
    camera.right = 0.5 * frustumSize * aspect;
    camera.top = 0.5 * frustumSize;
    camera.bottom = -0.5 * frustumSize;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height, false);
  };

  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.enableRotate = true;
  controls.target.set(keyCenter.x, keyCenterY, keyCenter.z);
  controls.update();

  resize();

  if ('ResizeObserver' in window) {
    const observer = new ResizeObserver(resize);
    observer.observe(root);
  } else {
    window.addEventListener('resize', resize);
  }

  const animate = () => {
    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  };
  animate();
</script>
