<section class="w-full px-6">
  <div class="mx-auto max-w-5xl pt-20 md:pt-28 lg:pt-32 text-center">
    <h1 class="mx-auto max-w-4xl font-canela font-medium tracking-[-0.018em] text-[3.35rem] md:text-[4.5rem] lg:text-[5.35rem] leading-[0.98] text-zinc-950 dark:text-zinc-100">
      {{ include.heading }}
    </h1>
    <p class="mx-auto mt-8 max-w-3xl text-lg md:text-xl leading-relaxed text-zinc-600 dark:text-zinc-400">
      {{ include.description }} {{ include.subdescription }}
    </p>
  </div>

  <div class="mx-auto mt-14 md:mt-20 max-w-4xl">
    <div class="feature-video-frame">
      <div class="feature-video-toolbar" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="feature-video-stage">
        <video class="feature-video" controls playsinline preload="metadata">
          <source src="{{ include.video }}" type="video/mp4">
          your browser does not support the video tag
        </video>
      </div>
    </div>
  </div>
</section>
