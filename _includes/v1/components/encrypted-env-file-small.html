<div class="terminal-hero-card terminal-hero-card-premium mx-auto bg-[#11100d] text-[#d7d1c1] font-mono text-sm rounded-xl border shadow-2xl overflow-hidden" style="border-color: rgba(165, 128, 64, 0.58);" data-dotenvx-terminal-demo>
  <div class="flex items-center justify-between px-3 py-2 bg-[#1b1710] border-b" style="border-color: rgba(165, 128, 64, 0.40);">
    <div class="flex items-center gap-1">
      <span class="h-2 w-2 rounded-full bg-[#d9b56a]"></span>
      <span class="h-2 w-2 rounded-full bg-[#bb944f]"></span>
      <span class="h-2 w-2 rounded-full bg-[#9a753c]"></span>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-[11px] tracking-wide text-[#b7a98a]">npm i @dotenvx/dotenvx</span>
      <button type="button" class="terminal-sound-toggle" data-sound-toggle aria-pressed="false">sound off</button>
    </div>
  </div>

  <pre class="dotenvx-live-terminal px-5 py-5 leading-relaxed whitespace-pre overflow-auto" aria-live="polite"></pre>
</div>

<style>
  .dotenvx-live-terminal {
    height: 22rem;
    margin: 0;
    scrollbar-width: thin;
  }
  .terminal-sound-toggle {
    border: 1px solid rgba(205, 170, 98, 0.38);
    border-radius: 999px;
    background: rgba(14, 12, 9, 0.84);
    color: #9b8f74;
    font-size: 10px;
    line-height: 1;
    padding: 4px 7px 5px;
    letter-spacing: 0;
    cursor: pointer;
  }
  .terminal-sound-toggle:hover {
    border-color: rgba(205, 170, 98, 0.58);
    color: #c3b491;
  }
  .terminal-sound-toggle[aria-pressed="true"] {
    color: #e2d3ac;
    border-color: rgba(205, 170, 98, 0.72);
  }

  .dotenvx-live-terminal .dim { color: #9b8f74; }
  .dotenvx-live-terminal .cmd { color: #f0db9c; }
  .dotenvx-live-terminal .ok { color: #7ce38f; }
  .dotenvx-live-terminal .title { color: #cdaa62; }
  .dotenvx-live-terminal .key { color: #d3d0c6; }
  .dotenvx-live-terminal .val { color: #d3bc66; }
  .dotenvx-live-terminal .cursor {
    display: inline-block;
    width: 0;
    height: 1.02em;
    margin-left: 0;
    border-left: 2px solid #f0db9c;
    animation: dotenvx-caret 920ms step-end infinite;
    vertical-align: -0.14em;
  }
  .dotenvx-live-terminal .vim-frame {
    --vim-editor-bg: rgba(10, 9, 7, 0.68);
    display: block;
    position: relative;
    margin-top: 22px;
    box-sizing: border-box;
    max-width: 100%;
    border: 1px solid rgba(205, 170, 98, 0.45);
    border-radius: 6px;
    padding: 16px 16px 10px 12px;
    background: var(--vim-editor-bg);
    white-space: pre-wrap;
    overflow: visible;
    overflow-wrap: anywhere;
    word-break: break-word;
    box-shadow:
      inset 0 0 0 1px rgba(255, 223, 158, 0.08),
      0 8px 20px rgba(0, 0, 0, 0.32);
  }
  .dotenvx-live-terminal .vim-tab {
    position: absolute;
    top: -25px;
    left: 14px;
    display: inline-block;
    padding: 6px 12px 7px;
    border: 1px solid rgba(205, 170, 98, 0.58);
    border-bottom: 1px solid rgba(205, 170, 98, 0.45);
    border-radius: 6px 6px 0 0;
    background: var(--vim-editor-bg);
    color: #b7a98a;
    font-size: 10px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: 0;
    box-shadow: none;
  }
  .dotenvx-live-terminal .vim-frame .val {
    overflow-wrap: anywhere;
    word-break: break-word;
  }
  .dotenvx-live-terminal .vim-comment { color: #7f8f7b; }
  .dotenvx-live-terminal .vim-js-fn { color: #7fb8d8; }
  .dotenvx-live-terminal .vim-js-str { color: #d7c56f; }
  .dotenvx-live-terminal .vim-js-var { color: #c89ae0; }
  .dotenvx-live-terminal .vim-cursor-normal {
    display: block;
    position: absolute;
    background: #d7d1c1;
    color: #0f0e0b;
    min-width: 0.62ch;
    height: 1.12em;
    line-height: 1.08em;
    left: calc(12px + ((var(--vim-col, 1) - 1) * 0.62ch) + 0.04ch);
    top: calc(16px + ((var(--vim-row, 1) - 1) * 1.52em) + 0.52em);
    pointer-events: none;
  }
  .dotenvx-live-terminal .vim-cursor-insert {
    display: block;
    position: absolute;
    background: #bfb7a1;
    color: #0f0e0b;
    min-width: 0.62ch;
    height: 1.12em;
    line-height: 1.08em;
    left: calc(12px + ((var(--vim-col, 1) - 1) * 0.62ch) + 0.04ch);
    top: calc(16px + ((var(--vim-row, 1) - 1) * 1.52em) + 0.52em);
    pointer-events: none;
  }

  @keyframes dotenvx-caret {
    0%, 45% { opacity: 1; }
    46%, 100% { opacity: 0; }
  }

  @media (max-width: 767px) {
    .dotenvx-live-terminal {
      height: 19rem;
      font-size: 12px;
      line-height: 1.5;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .dotenvx-live-terminal .cursor {
      animation: none;
      opacity: 1;
    }
  }
</style>

<script>
  (() => {
    const demos = document.querySelectorAll("[data-dotenvx-terminal-demo]");
    if (!demos.length) return;

    const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    const indexJsLines = [
      "// index.js",
      "console.log(`Hello ${process.env.HELLO}`)"
    ];
    const encryptedFileLines = [
      '# .env – encrypted with dotenvx',
      'HELLO="encrypted:BIWFIR+r/iRY0lLEjUjCHLgzLs6mKg3vcaz39xnCDyArfqWZpFU8NN5xVnf68hYRhPZrzNJIaUr33TCQdD0RgLeIgjXpltN+hmiuH/5thsMLbfFdxCbIsiqhOv6PcmY2yCgxkIY6"'
    ];

    const escapeHtml = (value) =>
      value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");

    const renderVimLine = (line, fileName) => {
      if (!line) return "";
      if (fileName.endsWith(".js")) {
        if (line.startsWith("//")) {
          return `<span class=\"vim-comment\">${escapeHtml(line)}</span>`;
        }
        if (line === "console.log(`Hello ${process.env.HELLO}`)") {
          return [
            '<span class="vim-js-fn">console.log</span>(',
            '<span class="vim-js-str">`Hello </span>',
            '<span class="vim-js-var">${process.env.HELLO}</span>',
            '<span class="vim-js-str">`</span>',
            ")"
          ].join("");
        }
      }
      if (line.startsWith("#/") || line.startsWith("# .env")) {
        return `<span class=\"dim\">${escapeHtml(line)}</span>`;
      }
      const equalsIndex = line.indexOf("=");
      if (equalsIndex === -1) return escapeHtml(line);
      const key = line.slice(0, equalsIndex);
      const val = line.slice(equalsIndex + 1);
      return `<span class=\"key\">${escapeHtml(key)}</span>=<span class=\"val\">${escapeHtml(val)}</span>`;
    };

    const renderVim = (fileName, lines, status) => {
      const body = lines
        .map((line) => {
          return renderVimLine(line, fileName) || "&nbsp;";
        })
        .join("\n");

      return [
        body,
        "",
        `<span class=\"dim\">${escapeHtml(status)}</span>`
      ].join("\n");
    };

    demos.forEach((demo) => {
      if (demo.dataset.demoReady === "1") return;
      demo.dataset.demoReady = "1";

      const screen = demo.querySelector(".dotenvx-live-terminal");
      const soundToggle = demo.querySelector("[data-sound-toggle]");
      if (!screen) return;
      const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const coarsePointer = window.matchMedia("(pointer: coarse)").matches;

      const state = {
        shellLines: [],
        mode: "shell",
        vimMarkup: "",
        activeCommand: "",
        vimLines: [],
        vimFileName: ".env",
        vimCursor: null,
        showPrompt: false,
        soundEnabled: false
      };
      let audioContext = null;
      let noiseBuffer = null;
      let ambienceAudio = null;
      let ambienceFadeRaf = null;
      let lastTickAt = 0;
      let typedChars = 0;

      const updateSoundToggle = () => {
        if (!soundToggle) return;
        soundToggle.textContent = state.soundEnabled ? "sound on" : "sound off";
        soundToggle.setAttribute("aria-pressed", state.soundEnabled ? "true" : "false");
      };

      const ensureAudioContext = async () => {
        if (audioContext) {
          try {
            if (audioContext.state === "suspended") await audioContext.resume();
          } catch (_) {}
          return audioContext;
        }
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return null;
        audioContext = new Ctx();
        const length = Math.floor(audioContext.sampleRate * 0.03);
        noiseBuffer = audioContext.createBuffer(1, length, audioContext.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < length; i += 1) data[i] = Math.random() * 2 - 1;
        try {
          if (audioContext.state === "suspended") await audioContext.resume();
        } catch (_) {}
        return audioContext;
      };

      const ensureAmbienceAudio = () => {
        if (ambienceAudio) return ambienceAudio;
        ambienceAudio = new Audio("/assets/audio/ambience/sacred-cryptography.ogg");
        ambienceAudio.loop = true;
        ambienceAudio.preload = "auto";
        ambienceAudio.volume = 0;
        return ambienceAudio;
      };

      const fadeAmbienceTo = (target, durationMs) => {
        const audio = ensureAmbienceAudio();
        if (ambienceFadeRaf) cancelAnimationFrame(ambienceFadeRaf);
        const start = performance.now();
        const startVol = audio.volume;
        const delta = target - startVol;
        const step = (now) => {
          const t = Math.min(1, (now - start) / durationMs);
          audio.volume = Math.max(0, Math.min(1, startVol + (delta * t)));
          if (t < 1) {
            ambienceFadeRaf = requestAnimationFrame(step);
          } else {
            ambienceFadeRaf = null;
          }
        };
        ambienceFadeRaf = requestAnimationFrame(step);
      };

      const startAmbience = () => {
        const audio = ensureAmbienceAudio();
        const playPromise = audio.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
        fadeAmbienceTo(0.26, 700);
      };

      const stopAmbience = () => {
        if (!ambienceAudio) return;
        fadeAmbienceTo(0, 400);
        const current = ambienceAudio;
        window.setTimeout(() => {
          if (!state.soundEnabled && current === ambienceAudio) current.pause();
        }, 440);
      };

      const playTypeTick = (ch = "") => {
        if (!state.soundEnabled || prefersReduced) return;
        const now = performance.now();
        const minInterval = coarsePointer ? 108 : 72;
        if (now - lastTickAt < minInterval) return;
        typedChars += 1;
        if (coarsePointer && typedChars % 2 !== 0) return;
        lastTickAt = now;
        if (!audioContext) return;
        if (audioContext.state !== "running") {
          audioContext.resume().then(() => {
            if (state.soundEnabled && (!ambienceAudio || ambienceAudio.paused)) startAmbience();
          }).catch(() => {});
          return;
        }
        try {
          const at = audioContext.currentTime;
          const isSpace = /\s/.test(ch);
          const isPunct = /[.,;:!?'"`]/.test(ch);
          const isSymbol = /[@#$%^&*()_+\-=[\]{}|\\/<>\~]/.test(ch);
          const bodyDecay = isSpace ? 0.042 : isPunct ? 0.018 : 0.024;
          const clickDecay = isSpace ? 0.012 : isPunct ? 0.009 : 0.010;
          const bodyVol = isSpace ? 0.014 : isPunct ? 0.0065 : 0.009;
          const clickVol = isSpace ? 0.010 : isPunct ? 0.014 : 0.013;
          const bodyFreq = isSpace ? 1120 : isSymbol ? 1580 : 1460;
          const clickFreq = isSpace ? 3350 : isPunct ? 4700 : 4300;

          // Main downstroke body (keycap + switch thock).
          const bodyNoise = audioContext.createBufferSource();
          bodyNoise.buffer = noiseBuffer;
          const bodyBp = audioContext.createBiquadFilter();
          bodyBp.type = "bandpass";
          bodyBp.frequency.setValueAtTime(bodyFreq + (Math.random() * 120 - 60), at);
          bodyBp.Q.setValueAtTime(isSpace ? 0.88 : 1.2, at);
          const bodyGain = audioContext.createGain();
          bodyGain.gain.setValueAtTime(0.0001, at);
          bodyGain.gain.linearRampToValueAtTime(bodyVol, at + 0.002);
          bodyGain.gain.exponentialRampToValueAtTime(0.0001, at + bodyDecay);

          // Crisp top click (switch contact).
          const clickNoise = audioContext.createBufferSource();
          clickNoise.buffer = noiseBuffer;
          const clickHp = audioContext.createBiquadFilter();
          clickHp.type = "highpass";
          clickHp.frequency.setValueAtTime(clickFreq + (Math.random() * 260 - 130), at);
          clickHp.Q.setValueAtTime(1.25, at);
          const clickGain = audioContext.createGain();
          clickGain.gain.setValueAtTime(0.0001, at);
          clickGain.gain.linearRampToValueAtTime(clickVol, at + 0.0016);
          clickGain.gain.exponentialRampToValueAtTime(0.0001, at + clickDecay);

          bodyNoise.connect(bodyBp);
          bodyBp.connect(bodyGain);
          bodyGain.connect(audioContext.destination);
          clickNoise.connect(clickHp);
          clickHp.connect(clickGain);
          clickGain.connect(audioContext.destination);

          // Subtle keycap mass resonance, stronger on spacebar.
          let resonance = null;
          let resonanceGain = null;
          if (isSpace) {
            resonance = audioContext.createOscillator();
            resonance.type = "sine";
            resonance.frequency.setValueAtTime(168 + (Math.random() * 16 - 8), at);
            resonanceGain = audioContext.createGain();
            resonanceGain.gain.setValueAtTime(0.0001, at);
            resonanceGain.gain.linearRampToValueAtTime(0.0046, at + 0.0018);
            resonanceGain.gain.exponentialRampToValueAtTime(0.0001, at + 0.035);
            resonance.connect(resonanceGain);
            resonanceGain.connect(audioContext.destination);
            resonance.start(at);
            resonance.stop(at + 0.039);
          }

          bodyNoise.start(at);
          bodyNoise.stop(at + bodyDecay + 0.006);
          clickNoise.start(at);
          clickNoise.stop(at + clickDecay + 0.005);

          // Occasional very small release tick for realism.
          if (!isSpace && Math.random() < 0.42) {
            const relAt = at + 0.017 + Math.random() * 0.011;
            const release = audioContext.createBufferSource();
            release.buffer = noiseBuffer;
            const relHp = audioContext.createBiquadFilter();
            relHp.type = "highpass";
            relHp.frequency.setValueAtTime(4200 + Math.random() * 520, relAt);
            const relGain = audioContext.createGain();
            relGain.gain.setValueAtTime(0.0001, relAt);
            relGain.gain.linearRampToValueAtTime(0.0038, relAt + 0.0008);
            relGain.gain.exponentialRampToValueAtTime(0.0001, relAt + 0.008);
            release.connect(relHp);
            relHp.connect(relGain);
            relGain.connect(audioContext.destination);
            release.start(relAt);
            release.stop(relAt + 0.011);
          }
        } catch (_) {}
      };

      const nextDelay = (ch = "", nextCh = "", mode = "shell") => {
        const soundMode = state.soundEnabled;
        const base = mode === "vim"
          ? (soundMode ? 74 : 62)
          : (soundMode ? 66 : 52);
        const jitter = mode === "vim"
          ? (soundMode ? 44 : 44)
          : (soundMode ? 38 : 36);

        let delay = base + Math.floor(Math.random() * jitter);
        if (ch === " ") delay += 70 + Math.floor(Math.random() * 55);
        if (/[.,;:!?]/.test(ch)) delay += 90 + Math.floor(Math.random() * 90);
        if (/[:=\/\\()\[\]{}]/.test(ch)) delay += 14 + Math.floor(Math.random() * 20);
        if (nextCh && /[A-Z]/.test(nextCh) && ch === " ") delay += 24;
        if (soundMode && Math.random() < 0.03) delay += 120 + Math.floor(Math.random() * 120);
        return delay;
      };

      if (soundToggle) {
        updateSoundToggle();
        soundToggle.addEventListener("click", async () => {
          state.soundEnabled = !state.soundEnabled;
          if (state.soundEnabled) {
            await ensureAudioContext();
            stopAmbience();
            startAmbience();
          } else {
            stopAmbience();
          }
          updateSoundToggle();
        });
      }
      document.addEventListener("visibilitychange", () => {
        if (!state.soundEnabled || !audioContext) return;
        if (document.visibilityState === "visible" && audioContext.state !== "running") {
          audioContext.resume().then(() => {
            if (state.soundEnabled) {
              stopAmbience();
              startAmbience();
            }
          }).catch(() => {});
        }
      });

      const render = () => {
        if (state.mode === "vim") {
          let cursorMarkup = "";
          if (state.vimCursor) {
            const cursorClass = state.vimCursor.mode === "insert" ? "vim-cursor-insert" : "vim-cursor-normal";
            const cursorChar = state.vimCursor.char || "&nbsp;";
            cursorMarkup = `<span class="${cursorClass}" style="--vim-row:${state.vimCursor.row};--vim-col:${state.vimCursor.col};">${cursorChar}</span>`;
          }
          screen.innerHTML = `<span class=\"vim-frame\"><span class=\"vim-tab\">${escapeHtml(state.vimFileName)}</span>${state.vimMarkup}${cursorMarkup}</span>`;
          return;
        }

        const lines = [...state.shellLines];
        if (state.activeCommand) {
          lines.push(`<span class=\"cmd\">$ ${escapeHtml(state.activeCommand)}</span><span class=\"cursor\"></span>`);
        } else if (state.showPrompt) {
          lines.push('<span class="cmd">$ </span><span class="cursor"></span>');
        }

        screen.innerHTML = lines.join("\n");
        screen.scrollTop = screen.scrollHeight;
      };

      const pushLine = (line) => {
        state.shellLines.push(line);
        if (state.shellLines.length > 32) state.shellLines = state.shellLines.slice(-32);
        render();
      };

      const typeCommand = async (command) => {
        state.mode = "shell";
        state.showPrompt = true;
        state.activeCommand = "";
        render();
        for (let i = 0; i < command.length; i += 1) {
          const ch = command[i];
          const nextCh = command[i + 1] || "";
          state.activeCommand += ch;
          render();
          playTypeTick(ch);
          await wait(nextDelay(ch, nextCh, "shell"));
        }
        await wait(210);
        pushLine(`<span class=\"cmd\">$ ${escapeHtml(command)}</span>`);
        state.showPrompt = false;
        state.activeCommand = "";
        render();
      };

      const runCommand = async (command, outputLines, pause = 900, options = {}) => {
        const { clearAfter = false } = options;
        await typeCommand(command);
        if (clearAfter) {
          await wait(120);
          resetTerminal();
          await wait(pause);
          return;
        }
        for (const line of outputLines) {
          pushLine(line);
          await wait(220);
        }
        state.showPrompt = true;
        render();
        await wait(pause);
        state.showPrompt = false;
        render();
      };

      const showVim = async (fileName, lines, status, duration = 2200) => {
        state.mode = "vim";
        state.vimFileName = fileName;
        state.vimLines = lines;
        state.vimCursor = null;
        state.vimMarkup = renderVim(state.vimFileName, state.vimLines, status);
        render();
        await wait(duration);
      };

      const inspectEncryptedVim = async (fileName, lines) => {
        state.mode = "vim";
        state.vimFileName = fileName;
        state.vimLines = lines;

        const normalFrames = [
          { status: `"${fileName}"  1,1  -- NORMAL --`, row: 1, col: 1 },
          { status: `"${fileName}"  2,1  -- NORMAL --`, row: 2, col: 1 },
          { status: `"${fileName}"  2,2  -- NORMAL --`, row: 2, col: 2 },
          { status: `"${fileName}"  2,1  -- NORMAL --`, row: 2, col: 1 }
        ];

        for (let i = 0; i < normalFrames.length; i += 1) {
          const frame = normalFrames[i];
          const line = state.vimLines[frame.row - 1] || "";
          const idx = Math.max(0, Math.min(line.length - 1, frame.col - 1));
          const char = line.length ? escapeHtml(line[idx]) : "&nbsp;";
          state.vimCursor = { row: frame.row, col: frame.col, mode: "normal", char };
          state.vimMarkup = renderVim(state.vimFileName, state.vimLines, frame.status);
          render();
          if (i > 0) {
            playTypeTick("l");
            await wait(58);
            playTypeTick("l");
          }
          await wait(330);
        }

        playTypeTick("i");
        state.vimCursor = { row: 2, col: 1, mode: "insert", char: "" };
        state.vimMarkup = renderVim(state.vimFileName, state.vimLines, `"${fileName}"  2,1  -- INSERT --`);
        render();
        await wait(240);

        state.vimCursor = { row: 2, col: 2, mode: "insert", char: "" };
        state.vimMarkup = renderVim(state.vimFileName, state.vimLines, `"${fileName}"  2,2  -- INSERT --`);
        render();
        playTypeTick(" ");
        await wait(190);

        playTypeTick(" ");
        {
          const line = state.vimLines[1] || "";
          const idx = Math.max(0, Math.min(line.length - 1, 0));
          const char = line.length ? escapeHtml(line[idx]) : "&nbsp;";
          state.vimCursor = { row: 2, col: 1, mode: "normal", char };
        }
        state.vimMarkup = renderVim(state.vimFileName, state.vimLines, `"${fileName}"  2,1  -- NORMAL --`);
        render();
        await wait(360);
        state.vimCursor = null;
      };

      const typeInVim = async (fileName, values, preserveExisting = false) => {
        state.mode = "vim";
        state.vimFileName = fileName;
        if (!preserveExisting) {
          state.vimLines = [""];
        } else if (!state.vimLines.length) {
          state.vimLines = [""];
        }
        state.vimCursor = null;

        const linesToType = Array.isArray(values) ? values : [values];
        for (let i = 0; i < linesToType.length; i += 1) {
          if (preserveExisting || i > 0) state.vimLines.push("");
          const lineIndex = preserveExisting ? state.vimLines.length - 1 : i;
          state.vimCursor = null;
          state.vimMarkup = renderVim(state.vimFileName, state.vimLines, `"${fileName}" [New]  ${lineIndex + 1},1  -- INSERT --`);
          render();
          for (let j = 0; j < linesToType[i].length; j += 1) {
            const ch = linesToType[i][j];
            const nextCh = linesToType[i][j + 1] || "";
            state.vimLines[lineIndex] += ch;
            state.vimCursor = null;
            state.vimMarkup = renderVim(state.vimFileName, state.vimLines, `"${fileName}" [New]  ${lineIndex + 1},1  -- INSERT --`);
            render();
            playTypeTick(ch);
            await wait(nextDelay(ch, nextCh, "vim"));
          }
          await wait(150);
        }
      };

      const exitVim = async (status) => {
        state.mode = "vim";
        state.vimCursor = null;
        const commandMatch = status.match(/^(.*?)(\s+:[a-z]+)$/i);
        if (!commandMatch) {
          state.vimMarkup = renderVim(state.vimFileName, state.vimLines, status);
          render();
          await wait(460);
          return;
        }

        const baseStatus = commandMatch[1];
        const fullCommand = commandMatch[2].trim();

        // Visual insert -> normal mode transition for Esc key.
        state.vimMarkup = renderVim(state.vimFileName, state.vimLines, `${baseStatus}  -- INSERT --`);
        render();
        await wait(90);
        playTypeTick(" ");
        state.vimMarkup = renderVim(state.vimFileName, state.vimLines, `${baseStatus}  -- NORMAL --`);
        render();
        await wait(140);

        // Visual command entry (:wq / :q) with matching key sounds.
        let typed = "";
        for (let i = 0; i < fullCommand.length; i += 1) {
          const ch = fullCommand[i];
          const nextCh = fullCommand[i + 1] || "";
          typed += ch;
          state.vimMarkup = renderVim(state.vimFileName, state.vimLines, `${baseStatus}  ${typed}`);
          render();
          playTypeTick(ch);
          await wait(nextDelay(ch, nextCh, "vim"));
        }
        playTypeTick("\n");
        await wait(70);
        await wait(260);
      };

      const closeVim = async () => {
        state.mode = "shell";
        state.vimCursor = null;
        render();
        await wait(420);
      };

      const resetTerminal = () => {
        state.shellLines = [];
        state.mode = "shell";
        state.vimMarkup = "";
        state.activeCommand = "";
        state.vimLines = [];
        state.vimCursor = null;
        state.showPrompt = false;
        render();
      };

      const idleAtPrompt = async (ms) => {
        state.mode = "shell";
        state.showPrompt = true;
        state.activeCommand = "";
        render();
        await wait(ms);
        state.showPrompt = false;
        render();
      };

      const loop = async () => {
        while (document.body.contains(demo)) {
          resetTerminal();
          await idleAtPrompt(2700);
          await runCommand("npm install @dotenvx/dotenvx", [
            "<span class=\"ok\">dotenvx installed.</span>"
          ], 950);
          await runCommand("vim .env", [], 380);
          await showVim(".env", ["# .env"], "\".env\" [New]  1,1  -- INSERT --", 500);
          await typeInVim(".env", 'HELLO="World"', true);
          await wait(750);
          await exitVim("\".env\" [New]  2,13  :wq");
          await closeVim();
          await runCommand("dotenvx encrypt", [
            "<span class=\"ok\">◈ encrypted (.env) + key (.env.keys)</span>"
          ], 1050);
          await runCommand("vim .env", [], 300);
          await inspectEncryptedVim(".env", encryptedFileLines);
          await exitVim("\".env\"  2L, 301B  :q");
          await closeVim();
          await runCommand("vim index.js", [], 320);
          await showVim("index.js", [], "\"index.js\" [New]  0,0  -- INSERT --", 450);
          await typeInVim("index.js", indexJsLines);
          await wait(700);
          await exitVim("\"index.js\" [New]  2,41  :wq");
          await closeVim();
          await runCommand("dotenvx run -- node index.js", [
            "<span class=\"val\">[dotenvx@1.57.0] injecting env (1) from .env</span>",
            "Hello World"
          ], 1200);

          await runCommand("clear", [], 240, { clearAfter: true });
          await idleAtPrompt(700);
          await runCommand("vim .env.production", [], 320);
          await showVim(".env.production", ["# .env.production"], "\".env.production\" [New]  1,1  -- INSERT --", 420);
          await typeInVim(".env.production", 'HELLO="Production"', true);
          await wait(650);
          await exitVim("\".env.production\" [New]  2,18  :wq");
          await closeVim();
          await runCommand("dotenvx encrypt -f .env.production", [
            "<span class=\"ok\">◈ encrypted (.env.production) + key (.env.keys)</span>"
          ], 980);
          await runCommand("dotenvx run -f .env.production -- node index.js", [
            "<span class=\"val\">[dotenvx@1.57.0] injecting env (1) from .env.production</span>",
            "Hello Production"
          ], 1350);
          await runCommand("clear", [], 240, { clearAfter: true });
          await idleAtPrompt(700);
          await runCommand("vim .env.ci", [], 320);
          await showVim(".env.ci", ["# .env.ci"], "\".env.ci\" [New]  1,1  -- INSERT --", 420);
          await typeInVim(".env.ci", 'HELLO="CI"', true);
          await wait(650);
          await exitVim("\".env.ci\" [New]  2,11  :wq");
          await closeVim();
          await runCommand("dotenvx encrypt -f .env.ci", [
            "<span class=\"ok\">◈ encrypted (.env.ci) + key (.env.keys)</span>"
          ], 980);
          await runCommand("dotenvx run -f .env.ci -- node index.js", [
            "<span class=\"val\">[dotenvx@1.57.0] injecting env (1) from .env.ci</span>",
            "Hello CI"
          ], 1350);
          pushLine("<span class=\"dim\"># restarting demo...</span>");
          state.showPrompt = true;
          render();
          await wait(1500);
        }
      };

      render();
      loop();
    });
  })();
</script>
