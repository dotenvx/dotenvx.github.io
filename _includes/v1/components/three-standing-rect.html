<div
  class="{{ include.class }} relative overflow-hidden"
  data-secrets-box
  style="height: {{ include.height | default: '320px' }};"
>
  <canvas
    class="block h-full w-full"
    style="opacity: 0; -webkit-mask-image: radial-gradient(122% 114% at 50% 50%, rgba(0,0,0,1) 64%, rgba(0,0,0,0.92) 74%, rgba(0,0,0,0.52) 84%, rgba(0,0,0,0.14) 92%, rgba(0,0,0,0) 100%); mask-image: radial-gradient(122% 114% at 50% 50%, rgba(0,0,0,1) 64%, rgba(0,0,0,0.92) 74%, rgba(0,0,0,0.52) 84%, rgba(0,0,0,0.14) 92%, rgba(0,0,0,0) 100%);"
  ></canvas>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.167.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.167.1/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

  const root = document.querySelector('[data-secrets-box]:not([data-three-mounted])');
  if (!root) {
    throw new Error('secrets-box mount target not found');
  }

  root.setAttribute('data-three-mounted', 'true');
  const canvas = root.querySelector('canvas');
  canvas.style.transition = 'opacity 300ms ease-out';
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  const scene = new THREE.Scene();
  const desktopMinFrustumSize = 3.0;
  const mobileMinFrustumSize = 1.2;
  const includeZoom = Number({{ include.zoom | default: 1 }});
  const zoomFactor = Number.isFinite(includeZoom) && includeZoom > 0 ? includeZoom : 1;
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
  scene.background = null;
  renderer.setClearColor(0x000000, 0);

  camera.up.set(0, 1, 0);
  camera.position.set(0, 6, 0.001);
  camera.lookAt(0, 0.74, 0);

  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.25;
  renderer.physicallyCorrectLights = true;

  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  const envRT = pmremGenerator.fromScene(new RoomEnvironment(), 0.04);
  scene.environment = envRT.texture;
  pmremGenerator.dispose();

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
  scene.add(ambientLight);

  const keyLight = new THREE.DirectionalLight(0xbfe3ff, 2.8);
  keyLight.position.set(3, 5, 4);
  scene.add(keyLight);

  const rimLight = new THREE.DirectionalLight(0xffffff, 2.2);
  rimLight.position.set(-4, 2.5, -3);
  scene.add(rimLight);

  const secretsBoxGeometry = new THREE.BoxGeometry(0.12, 0.1662, 0.12);
  const secretsBoxEdgeGeometry = new THREE.EdgesGeometry(secretsBoxGeometry);
  const edgeHighlightMaterial = new THREE.LineBasicMaterial({
    color: 0xc8d0de,
    transparent: true,
    opacity: 0.16,
    toneMapped: false
  });
  const glowShellMaterial = new THREE.MeshBasicMaterial({
    color: 0xe7c96f,
    transparent: true,
    opacity: 0.12,
    blending: THREE.AdditiveBlending,
    side: THREE.BackSide,
    depthWrite: false,
    toneMapped: false
  });
  const labelTextureCache = new Map();
  const materialCache = new Map();
  const secretsBoxFaceMaterials = [];
  const baseEnvMapIntensity = 1.35;
  const baseRoughness = 0.055;
  const baseThickness = 1.1;
  const baseEdgeOpacity = edgeHighlightMaterial.opacity;
  const baseGlowOpacity = glowShellMaterial.opacity;
  const ghostDelayMs = 1500;
  const introRevealDelayMs = 800;
  const isMobileViewport = () => window.matchMedia('(max-width: 767px)').matches;
  const isMobileOnLoad = isMobileViewport();
  let ghostMix = isMobileOnLoad ? 0 : 1;
  let ghostTarget = isMobileOnLoad ? 0 : 1;

  const buildLabelTexture = (label) => {
    const c = document.createElement('canvas');
    c.width = 128; c.height = 128;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 128, 128);
    ctx.fillStyle = 'rgba(99, 104, 113, 0.24)';
    ctx.fillRect(0, 0, 128, 128);
    ctx.fillStyle = 'rgba(217, 191, 117, 0.82)';
    ctx.font = '500 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, 64, 64);
    const texture = new THREE.CanvasTexture(c);
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.needsUpdate = true;
    return texture;
  };

  const getLabelTexture = (label) => {
    if (!labelTextureCache.has(label)) {
      labelTextureCache.set(label, buildLabelTexture(label));
    }
    return labelTextureCache.get(label);
  };

  const getFaceMaterial = (label) => {
    if (!materialCache.has(label)) {
      materialCache.set(label, new THREE.MeshPhysicalMaterial({
        color: 0xfff7e3,
        transparent: true,
        opacity: 0.55,
        map: getLabelTexture(label),
        metalness: 0.0,
        roughness: baseRoughness,
        transmission: 0.94,
        thickness: baseThickness,
        ior: 1.5,
        clearcoat: 1.0,
        clearcoatRoughness: 0.05,
        attenuationColor: 0x7a8394,
        attenuationDistance: 1.6,
        envMapIntensity: baseEnvMapIntensity
      }));
    }
    return materialCache.get(label);
  };

  const createFaceMaterialVariant = (label, roughnessOffset, thicknessOffset, faceRole) => {
    const mat = getFaceMaterial(label).clone();
    mat.roughness = THREE.MathUtils.clamp(baseRoughness + roughnessOffset, 0.006, 0.06);
    mat.thickness = THREE.MathUtils.clamp(baseThickness + thicknessOffset, 1.35, 1.9);
    if (faceRole === 'top') {
      mat.opacity = 0.14;
      mat.transmission = 0.99;
      mat.roughness = Math.min(0.07, mat.roughness + 0.01);
      mat.thickness = 0.18;
      mat.clearcoatRoughness = 0.05;
    } else if (faceRole === 'bottom') {
      mat.opacity = 0.28;
      mat.transmission = 0.88;
      mat.thickness = 0.5;
      mat.clearcoatRoughness = 0.06;
    } else {
      mat.opacity = 0.25;
      mat.transmission = 0.98;
      mat.thickness = 0.42;
      mat.clearcoatRoughness = 0.04;
    }
    mat.userData.baseOpacity = mat.opacity;
    mat.userData.baseEnvMapIntensity = mat.envMapIntensity;
    secretsBoxFaceMaterials.push(mat);
    return mat;
  };

  const createSecretsBox = ({
    position = [0, 0.74, 0],
    rotation = [0, 0, 0],
    labels = { px: 's1', nx: 's2', py: 't', ny: 'b', pz: 's3', nz: 's4' }
  } = {}) => {
    const roughnessOffset = (Math.random() - 0.5) * 0.02;
    const thicknessOffset = (Math.random() - 0.5) * 0.18;
    // BoxGeometry face order: +x, -x, +y (top), -y (bottom), +z, -z
    const mesh = new THREE.Mesh(secretsBoxGeometry, [
      createFaceMaterialVariant(labels.px, roughnessOffset, thicknessOffset, 'side'),
      createFaceMaterialVariant(labels.nx, roughnessOffset, thicknessOffset, 'side'),
      createFaceMaterialVariant(labels.py, roughnessOffset, thicknessOffset, 'top'),
      createFaceMaterialVariant(labels.ny, roughnessOffset, thicknessOffset, 'bottom'),
      createFaceMaterialVariant(labels.pz, roughnessOffset, thicknessOffset, 'side'),
      createFaceMaterialVariant(labels.nz, roughnessOffset, thicknessOffset, 'side')
    ]);
    mesh.position.set(position[0], position[1], position[2]);
    mesh.rotation.set(rotation[0], rotation[1], rotation[2]);

    const edgeLines = new THREE.LineSegments(secretsBoxEdgeGeometry, edgeHighlightMaterial);
    edgeLines.renderOrder = 2;
    mesh.add(edgeLines);

    const glowShell = new THREE.Mesh(secretsBoxGeometry, glowShellMaterial);
    glowShell.scale.set(1.12, 1.12, 1.12);
    glowShell.renderOrder = 0;
    mesh.add(glowShell);

    return mesh;
  };

  const patternRows = [
    '• • • • • • • • • • • • • • • • • • • • • • • • •',
    '• • • • ■ ■ ■ ■ • • • • • • • • • • • • • • • • •',
    '• • ■ ■ ■ ■ ■ ■ ■ • • • • • • • • • • • • • • • •',
    '• ■ ■ ■ • • • ■ ■ ■ • • • ■ • • • • • • • • • • •',
    '• ■ ■ • • • • • • ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ •',
    '• ■ ■ • • ■ • • • ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ • •',
    '• ■ ■ • • • • ■ ■ ■ • • • ■ • • • • ■ ■ ■ ■ ■ • •',
    '• ■ ■ ■ • • ■ ■ ■ • • • • • • ■ • • ■ ■ • • ■ • •',
    '• • ■ ■ ■ ■ ■ ■ • • • • • • • • • • ■ ■ • • ■ • •',
    '• • • ■ ■ ■ ■ • • • • • • • • • • • • • • • • • •',
    '• • • • • • • • • • • • • • • • • • • • • • • • •'
  ];

  const grid = patternRows.map((row) => row.trim().split(/\s+/));
  const rowCount = grid.length;
  const colCount = grid[0].length;
  const pitch = 0.123;
  const centerX = 0;
  const centerZ = 0;
  const startX = centerX - ((colCount - 1) * pitch) / 2;
  const startZ = centerZ - ((rowCount - 1) * pitch) / 2;

  const secretsBoxGroup = new THREE.Group();
  const secretsBoxes = [];
  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();
  const tmpTarget = new THREE.Vector3();
  let exploded = false;
  let explosionPointerId = null;
  let hoverTimerId = null;
  let pointerOverKey = false;

  for (let r = 0; r < rowCount; r += 1) {
    for (let c = 0; c < colCount; c += 1) {
      if (grid[r][c] !== '■') continue;
      const x = startX + c * pitch;
      const z = startZ + r * pitch;
      const box = createSecretsBox({ position: [x, 0.74, z] });
      secretsBoxes.push(box);
      secretsBoxGroup.add(box);
    }
  }
  secretsBoxGroup.rotation.y = Math.PI;
  scene.add(secretsBoxGroup);

  const keyBounds = new THREE.Box3().setFromObject(secretsBoxGroup);
  const keyCenter = new THREE.Vector3();
  const keySize = new THREE.Vector3();
  keyBounds.getCenter(keyCenter);
  keyBounds.getSize(keySize);
  const keyCenterY = 0.74;
  const fitFrustumSize = Math.max(keySize.x, keySize.z) * 1.26;

  const localExplosionCenter = new THREE.Vector3(centerX, keyCenterY, centerZ);
  const unitNoise = (seed) => {
    const x = Math.sin(seed * 127.1) * 43758.5453123;
    return x - Math.floor(x);
  };

  const buildExplosionOffset = (basePosition, index) => {
    const radial = basePosition.clone().sub(localExplosionCenter);
    const rx = unitNoise(index + 0.11) * 2 - 1;
    const ry = unitNoise(index + 0.37) * 2 - 1;
    const rz = unitNoise(index + 0.73) * 2 - 1;
    const jitter = new THREE.Vector3(rx, ry, rz).normalize();

    // Deterministic pseudo-random spherical burst component.
    radial.y += (unitNoise(index + 1.31) - 0.5) * 0.45;
    if (radial.lengthSq() < 1e-6) {
      radial.copy(jitter);
    } else {
      radial.normalize().lerp(jitter, 0.42).normalize();
    }

    const spread = 0.24 + unitNoise(index + 2.41) * 0.46;
    return radial.multiplyScalar(spread);
  };

  for (let i = 0; i < secretsBoxes.length; i += 1) {
    const box = secretsBoxes[i];
    box.userData.basePosition = box.position.clone();
    box.userData.explosionOffset = buildExplosionOffset(box.position, i);
  }

  camera.position.set(keyCenter.x - 2.8, keyCenterY + 1.85, keyCenter.z - 2.7);
  camera.lookAt(keyCenter.x, keyCenterY, keyCenter.z);

const resize = () => {
    const width = root.clientWidth || 1;
    const height = root.clientHeight || 1;
    const aspect = width / height;
    const isMobile = window.matchMedia('(max-width: 767px)').matches;
    const minFrustumSize = isMobile ? mobileMinFrustumSize : desktopMinFrustumSize;
    const fitSize = fitFrustumSize * (isMobile ? 0.5 : 1);
    const baseFrustumSize = Math.max(minFrustumSize, fitSize);
    const frustumSize = baseFrustumSize / zoomFactor;

    camera.left = -0.5 * frustumSize * aspect;
    camera.right = 0.5 * frustumSize * aspect;
    camera.top = 0.5 * frustumSize;
    camera.bottom = -0.5 * frustumSize;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height, false);
    if (typeof controls !== 'undefined') {
      controls.enableRotate = !isMobile;
    }
  };

  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.enableRotate = !window.matchMedia('(max-width: 767px)').matches;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.35;
  controls.target.set(keyCenter.x, keyCenterY, keyCenter.z);
  controls.update();

  let autoRotateResumeTimer = null;
  controls.addEventListener('start', () => {
    controls.autoRotate = false;
    if (autoRotateResumeTimer) {
      clearTimeout(autoRotateResumeTimer);
      autoRotateResumeTimer = null;
    }
  });
  controls.addEventListener('end', () => {
    autoRotateResumeTimer = setTimeout(() => {
      controls.autoRotate = true;
      autoRotateResumeTimer = null;
    }, 1400);
  });

  const setPointerFromEvent = (event) => {
    const rect = canvas.getBoundingClientRect();
    pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  };

  const setGhostState = (enabled) => {
    ghostTarget = enabled ? 1 : 0;
  };

  const clearHoverTimer = () => {
    if (hoverTimerId !== null) {
      clearTimeout(hoverTimerId);
      hoverTimerId = null;
    }
  };

  const isPointerIntersectingKey = (event) => {
    setPointerFromEvent(event);
    raycaster.setFromCamera(pointer, camera);
    return raycaster.intersectObjects(secretsBoxes, false).length > 0;
  };

  const handlePointerMove = (event) => {
    if (event.pointerType === 'touch') {
      pointerOverKey = false;
      clearHoverTimer();
      setGhostState(false);
      return;
    }
    pointerOverKey = isPointerIntersectingKey(event);
    if (pointerOverKey && !exploded) {
      if (hoverTimerId === null && ghostTarget < 1) {
        hoverTimerId = setTimeout(() => {
          hoverTimerId = null;
          if (pointerOverKey && !exploded) {
            setGhostState(true);
          }
        }, ghostDelayMs);
      }
    } else {
      clearHoverTimer();
      setGhostState(false);
    }
  };

  const handlePointerDown = (event) => {
    if (!isPointerIntersectingKey(event)) return;
    setGhostState(false);
    clearHoverTimer();
    exploded = true;
    explosionPointerId = event.pointerId;
    if (canvas.setPointerCapture) {
      canvas.setPointerCapture(event.pointerId);
    }
  };

  const releaseExplosion = (event) => {
    if (explosionPointerId !== null && event.pointerId !== explosionPointerId) return;
    exploded = false;
    if (explosionPointerId !== null && canvas.releasePointerCapture) {
      canvas.releasePointerCapture(explosionPointerId);
    }
    explosionPointerId = null;
    if (pointerOverKey) {
      clearHoverTimer();
      hoverTimerId = setTimeout(() => {
        hoverTimerId = null;
        if (pointerOverKey && !exploded) {
          setGhostState(true);
        }
      }, ghostDelayMs);
    }
  };

  canvas.addEventListener('pointermove', handlePointerMove);
  canvas.addEventListener('pointerdown', handlePointerDown);
  canvas.addEventListener('pointerup', releaseExplosion);
  canvas.addEventListener('pointercancel', releaseExplosion);
  canvas.addEventListener('pointerleave', (event) => {
    pointerOverKey = false;
    clearHoverTimer();
    setGhostState(false);
    releaseExplosion(event);
  });

  // Intro reveal uses the same ghost system, but reversed.
  if (!isMobileOnLoad) {
    setTimeout(() => {
      setGhostState(false);
    }, introRevealDelayMs);
  }

  resize();

  if ('ResizeObserver' in window) {
    const observer = new ResizeObserver(resize);
    observer.observe(root);
  } else {
    window.addEventListener('resize', resize);
  }

  const animate = () => {
    ghostMix = THREE.MathUtils.lerp(ghostMix, ghostTarget, 0.12);
    const ghostVisibility = 1 - ghostMix * 0.93;

    for (let i = 0; i < secretsBoxes.length; i += 1) {
      const box = secretsBoxes[i];
      tmpTarget.copy(box.userData.basePosition);
      if (exploded) {
        tmpTarget.add(box.userData.explosionOffset);
      }
      box.position.lerp(tmpTarget, exploded ? 0.14 : 0.16);
    }

    for (let i = 0; i < secretsBoxFaceMaterials.length; i += 1) {
      const mat = secretsBoxFaceMaterials[i];
      mat.opacity = mat.userData.baseOpacity * ghostVisibility;
      mat.envMapIntensity = mat.userData.baseEnvMapIntensity * (1 - ghostMix * 0.72);
    }
    edgeHighlightMaterial.opacity = baseEdgeOpacity * (1 - ghostMix * 0.9);
    glowShellMaterial.opacity = baseGlowOpacity * (1 - ghostMix * 0.88);

    controls.update();
    renderer.render(scene, camera);
    if (canvas.style.opacity !== '1') {
      canvas.style.opacity = '1';
    }
    requestAnimationFrame(animate);
  };
  animate();
</script>
