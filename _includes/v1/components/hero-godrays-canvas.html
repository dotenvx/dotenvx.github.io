<div class="pointer-events-none absolute left-0 top-0 z-[1] h-[120vh] w-full overflow-hidden" data-hero-godrays aria-hidden="true">
  <canvas class="block h-full w-full opacity-[0.62]"></canvas>
  <div class="absolute inset-0 bg-[linear-gradient(180deg,rgba(0,0,0,0)_0%,rgba(0,0,0,0)_58%,rgba(0,0,0,0.22)_72%,rgba(0,0,0,0.68)_86%,rgba(0,0,0,0.92)_96%,rgba(0,0,0,1)_100%)]"></div>
</div>

<script>
(() => {
  const root = document.querySelector('[data-hero-godrays]:not([data-godrays-mounted])');
  if (!root) return;
  root.setAttribute('data-godrays-mounted', 'true');

  const canvas = root.querySelector('canvas');
  const ctx = canvas.getContext('2d', { alpha: true });
  const ua = navigator.userAgent;
  const isSafari = /Safari/i.test(ua) && !/(Chrome|Chromium|CriOS|Edg|OPR|Firefox|FxiOS)/i.test(ua);
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const TARGET_OPACITY = 0.62;
  const MOBILE_BREAKPOINT = 768;
  const MOBILE_SOURCE_SHIFT_MAX = 0.55;
  const MOBILE_BEAM_LIMIT = 12;
  const MOBILE_DUST_LIMIT = 56;
  const MOBILE_BEAM_DUST_LIMIT = 72;
  const ENABLE_DUST = false;
  canvas.style.opacity = '0';
  canvas.style.transition = prefersReducedMotion ? 'none' : 'opacity 2800ms cubic-bezier(0.22, 1, 0.36, 1)';
  const DPR_CAP = isSafari ? 1.4 : 1.75;
  const dustCount = 90;
  const beamDustCount = 120;
  const BASE_ANGLE = -Math.PI * 0.24;
  const BASE_SOURCE_X = 0.21;
  const BASE_SOURCE_Y = -0.20;

  const defaultBeamConfigs = Array.from({ length: 20 }, () => ({
    nearWidth: 8,
    farWidth: 300,
    thickness: 1,
    thicknessFar: 1,
    length: 0.98,
    fadeLength: 0.64,
    opacity: 0.62,
    blur: 10,
    offset: 0,
    offsetStep: 0,
    angleAdjust: 0
  }));

  const externalBeamConfigs = Array.isArray(window.DOTENVX_GODRAY_BEAMS) ? window.DOTENVX_GODRAY_BEAMS : null;
  const beamConfigs = externalBeamConfigs && externalBeamConfigs.length > 0 ? externalBeamConfigs : defaultBeamConfigs;

  const dust = Array.from({ length: dustCount }, () => ({
    x: Math.random(),
    y: Math.random(),
    size: Math.random() * 2 + 0.35,
    alpha: Math.random() * 0.55 + 0.12
  }));

  const beamDust = Array.from({ length: beamDustCount }, () => {
    // Bias dust into lower-right area where rays continue through.
    const biasX = 0.48 + Math.random() * 0.48;
    const biasY = 0.40 + Math.random() * 0.54;
    return {
      x: biasX,
      y: biasY,
      size: Math.random() * 2.2 + 0.3,
      alpha: Math.random() * 0.8 + 0.18
    };
  });

  const makeLinearSeries = (count, start, end) => {
    if (count <= 0) return [];
    if (count === 1) return [(start + end) * 0.5];
    return Array.from({ length: count }, (_, i) => start + (i / (count - 1)) * (end - start));
  };

  const beamCount = beamConfigs.length;
  const leftCount = Math.round(beamCount * 0.3);
  const middleCount = Math.round(beamCount * 0.4);
  const rightCount = Math.max(0, beamCount - leftCount - middleCount);
  const middleStart = leftCount;
  const middleEnd = leftCount + middleCount - 1;
  const middleCenter = (middleStart + middleEnd) / 2;
  const middleHalfSpan = Math.max(1, (middleCount - 1) / 2);
  const middleFanMax = 0.14;
  const groupedSourceX = [
    ...makeLinearSeries(leftCount, -0.02, 0.07),
    ...makeLinearSeries(middleCount, 0.095, 0.205),
    ...makeLinearSeries(rightCount, 0.235, 0.30)
  ];

  const beams = beamConfigs.map((_, index) => {
    const spreadIndex = beamCount > 1 ? index / (beamCount - 1) : 0.5;
    const fallbackX = -0.02 + spreadIndex * 0.32;
    const sourceX = groupedSourceX[index] ?? fallbackX;
    const sourceY = -0.34;
    const inMiddleCluster = index >= middleStart && index <= middleEnd;
    const middleDelta = inMiddleCluster ? (index - middleCenter) / middleHalfSpan : 0;
    const angle = BASE_ANGLE - middleDelta * middleFanMax;
    const baseAlpha = 0.068;
    const middleStrength = inMiddleCluster
      ? (1 - Math.abs(middleDelta)) * 0.35 + 1.20
      : 0.70;
    const alpha = baseAlpha * middleStrength * (isSafari ? 0.82 : 1);
    const widthScale = isSafari ? 1.14 : 1;
    return {
      offset: 0,
      widthNear: 64 * widthScale,
      widthFar: 64 * widthScale,
      alpha,
      lengthScale: 0.98,
      fadeLength: 0.64,
      sourceX,
      sourceY,
      angle,
      blur: isSafari ? 16 : 10
    };
  });

  let width = 0;
  let height = 0;

  const resize = () => {
    const rect = root.getBoundingClientRect();
    width = Math.max(1, rect.width);
    height = Math.max(1, rect.height);
    const dpr = Math.min(window.devicePixelRatio || 1, DPR_CAP);
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  };

  const drawBeam = (beam, width, height) => {
    const angle = beam.angle;
    const mobileShift = width < MOBILE_BREAKPOINT
      ? -((MOBILE_BREAKPOINT - width) / MOBILE_BREAKPOINT) * MOBILE_SOURCE_SHIFT_MAX
      : 0;
    const shiftedSourceX = Math.max(-2.5, Math.min(1.2, beam.sourceX + mobileShift));
    const sourceX = width * shiftedSourceX;
    const sourceY = height * beam.sourceY;
    const len = Math.hypot(width, height) * 1.45 * beam.lengthScale;
    const normalX = -Math.sin(angle);
    const normalY = Math.cos(angle);
    const perpendicularOffset = beam.offset;
    const x = sourceX + normalX * perpendicularOffset;
    const y = sourceY + normalY * perpendicularOffset;

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    const grad = ctx.createLinearGradient(0, 0, 0, len);
    const fadeLength = Math.max(0.3, Math.min(0.95, beam.fadeLength));
    const mid1 = Math.max(0.12, fadeLength * 0.26);
    const mid2 = Math.max(mid1 + 0.08, fadeLength * 0.54);
    const mid3 = Math.max(mid2 + 0.08, fadeLength * 0.82);

    const topA = isSafari ? 0.34 : 0.42;
    const coreA = isSafari ? 0.58 : 0.72;
    const tailA = isSafari ? 0.28 : 0.34;
    const fadeA = isSafari ? 0.12 : 0.08;
    grad.addColorStop(0.00, `rgba(255, 246, 216, ${beam.alpha * topA})`);
    grad.addColorStop(mid1, `rgba(245, 231, 188, ${beam.alpha * coreA})`);
    grad.addColorStop(mid2, `rgba(229, 206, 146, ${beam.alpha * tailA})`);
    grad.addColorStop(mid3, `rgba(229, 206, 146, ${beam.alpha * fadeA})`);
    grad.addColorStop(fadeLength, 'rgba(0, 0, 0, 0)');
    grad.addColorStop(1.00, 'rgba(0, 0, 0, 0)');

    ctx.filter = `blur(${beam.blur}px)`;
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-beam.widthNear * 0.5, 0);
    ctx.lineTo(beam.widthNear * 0.5, 0);
    ctx.lineTo(beam.widthFar * 0.5, len);
    ctx.lineTo(-beam.widthFar * 0.5, len);
    ctx.closePath();
    ctx.fill();
    ctx.filter = 'none';

    ctx.restore();
  };

  const draw = () => {
    ctx.clearRect(0, 0, width, height);
    const isMobile = width < MOBILE_BREAKPOINT;
    const activeBeams = isMobile ? beams.slice(0, MOBILE_BEAM_LIMIT) : beams;
    const activeDustCount = isMobile ? Math.min(MOBILE_DUST_LIMIT, dust.length) : dust.length;
    const activeBeamDustCount = isMobile ? Math.min(MOBILE_BEAM_DUST_LIMIT, beamDust.length) : beamDust.length;

    ctx.globalCompositeOperation = isSafari ? 'screen' : 'lighter';

    for (const beam of activeBeams) drawBeam(beam, width, height);

    if (isSafari) {
      // Safari-specific soft fill to reduce visible striping between beams.
      const safariHaze = ctx.createLinearGradient(width * 0.03, 0, width * 0.68, height * 0.96);
      safariHaze.addColorStop(0.00, 'rgba(255, 241, 196, 0.08)');
      safariHaze.addColorStop(0.42, 'rgba(247, 228, 173, 0.05)');
      safariHaze.addColorStop(1.00, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = safariHaze;
      ctx.fillRect(0, 0, width, height);
    }

    ctx.globalCompositeOperation = 'source-over';
    if (ENABLE_DUST) {
      for (let i = 0; i < activeDustCount; i += 1) {
        const p = dust[i];
        ctx.fillStyle = `rgba(255, 242, 201, ${p.alpha * 0.22})`;
        ctx.beginPath();
        ctx.arc(p.x * width, p.y * height, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      // Denser "dust in light" layer, concentrated lower-right.
      const dustFog = ctx.createRadialGradient(
        width * 0.74,
        height * 0.78,
        0,
        width * 0.74,
        height * 0.78,
        Math.max(width, height) * 0.45
      );
      dustFog.addColorStop(0.0, 'rgba(255, 239, 196, 0.11)');
      dustFog.addColorStop(0.55, 'rgba(255, 233, 170, 0.045)');
      dustFog.addColorStop(1.0, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = dustFog;
      ctx.fillRect(0, 0, width, height);

      ctx.globalCompositeOperation = 'lighter';
      for (let i = 0; i < activeBeamDustCount; i += 1) {
        const p = beamDust[i];
        ctx.fillStyle = `rgba(255, 236, 186, ${p.alpha * 0.14})`;
        ctx.beginPath();
        ctx.arc(p.x * width, p.y * height, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalCompositeOperation = 'source-over';
  };

  const onResize = () => {
    resize();
    draw();
  };

  resize();
  draw();
  if (prefersReducedMotion) {
    canvas.style.opacity = String(TARGET_OPACITY);
  } else {
    requestAnimationFrame(() => {
      setTimeout(() => {
        canvas.style.opacity = String(TARGET_OPACITY);
      }, 1800);
    });
  }

  window.addEventListener('resize', onResize, { passive: true });
  window.addEventListener('pagehide', () => {
    window.removeEventListener('resize', onResize);
  }, { once: true });
})();
</script>
