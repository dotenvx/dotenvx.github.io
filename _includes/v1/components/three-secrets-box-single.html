<div
  class="{{ include.class }} relative overflow-hidden"
  data-three-secrets-box-single
  style="height: {{ include.height | default: '220px' }};"
>
  <canvas class="block h-full w-full"></canvas>
</div>

<script type="module">
  import * as THREE from 'https://unpkg.com/three@0.167.1/build/three.module.js';
  import { RoomEnvironment } from 'https://unpkg.com/three@0.167.1/examples/jsm/environments/RoomEnvironment.js';
  import { RoundedBoxGeometry } from 'https://unpkg.com/three@0.167.1/examples/jsm/geometries/RoundedBoxGeometry.js';

  const root = document.querySelector('[data-three-secrets-box-single]:not([data-three-mounted])');
  if (!root) {
    throw new Error('three-secrets-box-single mount target not found');
  }

  root.setAttribute('data-three-mounted', 'true');

  const canvas = root.querySelector('canvas');
  canvas.style.touchAction = 'none';
  canvas.style.cursor = 'default';
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 100);
  camera.position.set(0.5, 0.62, 0.92);
  camera.lookAt(0, 0, 0);

  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.NoToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.physicallyCorrectLights = true;

  const pmremGenerator = new THREE.PMREMGenerator(renderer);
  const envRT = pmremGenerator.fromScene(new RoomEnvironment(), 0.04);
  scene.environment = envRT.texture;
  pmremGenerator.dispose();

  scene.add(new THREE.AmbientLight(0xffffff, 0.0));

  const geometry = new RoundedBoxGeometry(0.24, 0.3324, 0.24, 5, 0.02);
  const makeEnvTextTexture = () => {
    const c = document.createElement('canvas');
    c.width = 1024;
    c.height = 1024;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 1024, 1024);
    ctx.fillStyle = '#ecd53f';
    ctx.font = '900 240px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.lineWidth = 14;
    ctx.strokeStyle = 'rgba(9, 9, 9, 0.5)';
    // Bottom-right placement similar to the .ENV reference.
    ctx.strokeText('.ENV', 940, 940);
    ctx.fillText('.ENV', 940, 940);
    const texture = new THREE.CanvasTexture(c);
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.generateMipmaps = false;
    texture.anisotropy = 1;
    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.needsUpdate = true;
    return texture;
  };

  const makeEnvInsetTexture = () => {
    const c = document.createElement('canvas');
    c.width = 1024;
    c.height = 1024;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 1024, 1024);
    ctx.fillStyle = 'rgba(10, 10, 10, 0.62)';
    ctx.font = '900 240px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    // Slight offset creates a deboss/inset feel.
    ctx.fillText('.ENV', 948, 948);
    const texture = new THREE.CanvasTexture(c);
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.generateMipmaps = false;
    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.needsUpdate = true;
    return texture;
  };

  const envTextTexture = makeEnvTextTexture();
  const envInsetTexture = makeEnvInsetTexture();
  const dotenvYellow = 0xecd53f;
  const sideMat = new THREE.MeshBasicMaterial({
    color: dotenvYellow,
    toneMapped: false
  });
  const sideMatEnv = sideMat.clone();
  const topMat = sideMat.clone();
  const bottomMat = sideMat.clone();

  // BoxGeometry face order: +x, -x, +y, -y, +z, -z
  const box = new THREE.Mesh(geometry, [sideMatEnv, sideMat.clone(), topMat, bottomMat, sideMat.clone(), sideMat.clone()]);
  scene.add(box);

  const envLabel = new THREE.Mesh(
    new THREE.PlaneGeometry(0.214, 0.298),
    new THREE.MeshBasicMaterial({
      map: envTextTexture,
      transparent: true,
      alphaTest: 0.06,
      side: THREE.DoubleSide,
      depthTest: true,
      depthWrite: false,
      toneMapped: false,
      polygonOffset: true,
      polygonOffsetFactor: -2,
      polygonOffsetUnits: -2
    })
  );
  envLabel.position.set(0, 0, 0.1245);
  envLabel.renderOrder = 10;
  box.add(envLabel);

  const envInset = new THREE.Mesh(
    new THREE.PlaneGeometry(0.214, 0.298),
    new THREE.MeshBasicMaterial({
      map: envInsetTexture,
      transparent: true,
      alphaTest: 0.03,
      depthTest: true,
      depthWrite: false,
      toneMapped: false,
      polygonOffset: true,
      polygonOffsetFactor: -1,
      polygonOffsetUnits: -1
    })
  );
  envInset.position.set(0, 0, 0.1233);
  envInset.renderOrder = 9;
  box.add(envInset);

  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(geometry),
    new THREE.LineBasicMaterial({
      color: 0x6f6120,
      transparent: true,
      opacity: 0.96,
      toneMapped: false
    })
  );
  box.add(edges);

  const glowShell = new THREE.Mesh(
    geometry,
    new THREE.MeshBasicMaterial({
      color: 0xecd53f,
      transparent: true,
      opacity: 0.06,
      blending: THREE.AdditiveBlending,
      side: THREE.BackSide,
      depthWrite: false,
      toneMapped: false
    })
  );
  glowShell.scale.set(1.12, 1.12, 1.12);
  box.add(glowShell);

  // Very subtle smoked coat.
  const smokeCoat = new THREE.Mesh(
    geometry,
    new THREE.MeshPhysicalMaterial({
      color: 0x2a271d,
      transparent: true,
      opacity: 0.075,
      transmission: 0.92,
      roughness: 0.07,
      metalness: 0.0,
      thickness: 0.16,
      ior: 1.35,
      clearcoat: 1.0,
      clearcoatRoughness: 0.08,
      envMapIntensity: 0.55
    })
  );
  smokeCoat.scale.set(1.01, 1.01, 1.01);
  smokeCoat.renderOrder = 3;
  box.add(smokeCoat);

  // Fresnel rim shell for edge glow/readability.
  const fresnelRim = new THREE.Mesh(
    geometry,
    new THREE.ShaderMaterial({
      uniforms: {
        rimColor: { value: new THREE.Color(0xf1dd73) },
        rimPower: { value: 2.6 },
        rimIntensity: { value: 0.45 },
        fade: { value: 1.0 }
      },
      vertexShader: `
        varying vec3 vWorldPos;
        varying vec3 vWorldNormal;
        void main() {
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vWorldPos = wp.xyz;
          vWorldNormal = normalize(mat3(modelMatrix) * normal);
          gl_Position = projectionMatrix * viewMatrix * wp;
        }
      `,
      fragmentShader: `
        uniform vec3 rimColor;
        uniform float rimPower;
        uniform float rimIntensity;
        uniform float fade;
        varying vec3 vWorldPos;
        varying vec3 vWorldNormal;
        void main() {
          vec3 viewDir = normalize(cameraPosition - vWorldPos);
          float fresnel = pow(1.0 - clamp(dot(normalize(vWorldNormal), viewDir), 0.0, 1.0), rimPower);
          float a = fresnel * rimIntensity;
          gl_FragColor = vec4(rimColor * a * fade, a * fade);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      side: THREE.DoubleSide,
      toneMapped: false
    })
  );
  fresnelRim.scale.set(1.035, 1.035, 1.035);
  fresnelRim.renderOrder = 4;
  box.add(fresnelRim);

  const fadeMaterials = [];
  box.traverse((obj) => {
    if (!obj.material) return;
    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
    for (let i = 0; i < mats.length; i += 1) {
      const mat = mats[i];
      if (!mat || fadeMaterials.includes(mat)) continue;
      mat.transparent = true;
      if (typeof mat.opacity !== 'number') mat.opacity = 1;
      mat.userData.baseOpacity = mat.opacity;
      fadeMaterials.push(mat);
    }
  });

  const resize = () => {
    const width = root.clientWidth || 1;
    const height = root.clientHeight || 1;
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
    renderer.setSize(width, height, false);
  };

  resize();
  if ('ResizeObserver' in window) {
    const observer = new ResizeObserver(resize);
    observer.observe(root);
  } else {
    window.addEventListener('resize', resize);
  }

  let isDragging = false;
  let dragMoved = false;
  let activePointerId = null;
  let lastX = 0;
  let lastY = 0;
  let downX = 0;
  let downY = 0;
  let spinVelocityX = 0;
  let spinVelocityY = 0;
  let isDisappearing = false;
  let disappearStartMs = 0;
  const raycaster = new THREE.Raycaster();
  const pointerNDC = new THREE.Vector2();
  const disappearDurationMs = 320;
  const dragSensitivity = 0.0084;
  const velocityDamping = 0.93;
  const baseSpinSpeed = 0.6;

  const startDisappearAndNavigate = () => {
    if (isDisappearing) return;
    isDisappearing = true;
    disappearStartMs = performance.now();
    setTimeout(() => {
      window.location.href = '/login';
    }, disappearDurationMs);
  };

  const setPointerNDC = (event) => {
    const rect = canvas.getBoundingClientRect();
    pointerNDC.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    pointerNDC.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  };

  const isPointerOnSecretsBox = (event) => {
    setPointerNDC(event);
    raycaster.setFromCamera(pointerNDC, camera);
    return raycaster.intersectObject(box, false).length > 0;
  };

  const onPointerDown = (event) => {
    if (isDisappearing) return;
    if (!isPointerOnSecretsBox(event)) return;
    isDragging = true;
    dragMoved = false;
    activePointerId = event.pointerId;
    lastX = event.clientX;
    lastY = event.clientY;
    downX = event.clientX;
    downY = event.clientY;
    if (canvas.setPointerCapture) canvas.setPointerCapture(event.pointerId);
  };

  const onPointerMove = (event) => {
    canvas.style.cursor = isPointerOnSecretsBox(event) ? 'pointer' : 'default';
    if (!isDragging || event.pointerId !== activePointerId) return;
    const dx = event.clientX - lastX;
    const dy = event.clientY - lastY;
    const totalDx = event.clientX - downX;
    const totalDy = event.clientY - downY;
    lastX = event.clientX;
    lastY = event.clientY;
    if ((totalDx * totalDx) + (totalDy * totalDy) > 49) {
      dragMoved = true;
    }

    box.rotation.y += dx * dragSensitivity;
    box.rotation.x += dy * dragSensitivity;

    spinVelocityY = dx * dragSensitivity * 0.36;
    spinVelocityX = dy * dragSensitivity * 0.36;
  };

  const endPointer = (event, allowNavigate = false) => {
    if (event.pointerId !== activePointerId) return;
    isDragging = false;
    if (canvas.releasePointerCapture) canvas.releasePointerCapture(event.pointerId);
    activePointerId = null;
    if (allowNavigate && !dragMoved) {
      startDisappearAndNavigate();
    }
  };

  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', (event) => endPointer(event, true));
  canvas.addEventListener('pointercancel', (event) => endPointer(event, false));
  canvas.addEventListener('pointerleave', (event) => {
    canvas.style.cursor = 'default';
    endPointer(event, false);
  });

  const animate = () => {
    const now = performance.now();
    if (isDisappearing) {
      const p = Math.min(1, (now - disappearStartMs) / disappearDurationMs);
      const ghostVisibility = 1 - p;
      box.scale.setScalar(1 - p * 0.12);
      box.position.y = p * 0.02;
      for (let i = 0; i < fadeMaterials.length; i += 1) {
        const mat = fadeMaterials[i];
        mat.opacity = mat.userData.baseOpacity * ghostVisibility;
      }
      if (fresnelRim.material && fresnelRim.material.uniforms && fresnelRim.material.uniforms.fade) {
        fresnelRim.material.uniforms.fade.value = ghostVisibility;
      }
      if (p >= 1) {
        box.visible = false;
      }
    }
    if (!isDragging) {
      box.rotation.x += spinVelocityX;
      box.rotation.y += spinVelocityY + baseSpinSpeed * (1 / 60);
      spinVelocityX *= velocityDamping;
      spinVelocityY *= velocityDamping;
    }
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  };
  animate();
</script>
