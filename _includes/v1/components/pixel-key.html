<div
  class="pixel-key {{ include.class }}"
  data-pixel-key
  data-px="{{ include.pixel | default: 6 }}"
  data-sample="{{ include.sample | default: 4 }}"
  data-src="{{ include.src | default: '/assets/img/bg/key-reference.png' }}"
></div>

<style>
  .pixel-key {
    --px: 6px;
    position: relative;
    width: 1px;
    height: 1px;
    pointer-events: none;
    user-select: none;
  }

  .pixel-key .pixel {
    position: absolute;
    width: var(--px);
    height: var(--px);
    border-radius: 999px;
    transform: translateZ(0);
    box-shadow: 0 0 0.6px rgba(255, 255, 255, 0.2);
  }
</style>

<script>
  (() => {
    const mounts = document.querySelectorAll("[data-pixel-key]");
    if (!mounts.length) return;

    const buildFromImage = (mount) => {
      const px = Math.max(1, Number(mount.dataset.px || 6));
      const sample = Math.max(1, Number(mount.dataset.sample || 4));
      const src = mount.dataset.src || "/assets/img/bg/key-reference.png";
      mount.style.setProperty("--px", `${px}px`);

      const img = new Image();
      img.decoding = "async";
      img.onload = () => {
        const w = img.naturalWidth || img.width;
        const h = img.naturalHeight || img.height;
        if (!w || !h) return;

        const off = document.createElement("canvas");
        off.width = w;
        off.height = h;
        const octx = off.getContext("2d", { willReadFrequently: true });
        if (!octx) return;
        octx.clearRect(0, 0, w, h);
        octx.drawImage(img, 0, 0, w, h);
        const data = octx.getImageData(0, 0, w, h).data;

        let minX = w;
        let minY = h;
        let maxX = 0;
        let maxY = 0;

        // Find bounding box of non-black key pixels.
        for (let y = 0; y < h; y += 1) {
          for (let x = 0; x < w; x += 1) {
            const i = (y * w + x) * 4;
            const a = data[i + 3];
            if (a < 8) continue;
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            if (lum < 18) continue;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }

        if (maxX <= minX || maxY <= minY) return;
        const bw = maxX - minX + 1;
        const bh = maxY - minY + 1;

        const frag = document.createDocumentFragment();
        for (let y = minY; y <= maxY; y += sample) {
          for (let x = minX; x <= maxX; x += sample) {
            // Use the brightest pixel in each block to preserve dotted highlights.
            let bestI = -1;
            let bestLum = 0;
            for (let yy = y; yy < Math.min(y + sample, maxY + 1); yy += 1) {
              for (let xx = x; xx < Math.min(x + sample, maxX + 1); xx += 1) {
                const i = (yy * w + xx) * 4;
                const a = data[i + 3];
                if (a < 8) continue;
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                if (lum > bestLum) {
                  bestLum = lum;
                  bestI = i;
                }
              }
            }

            if (bestI < 0 || bestLum < 18) continue;
            const r = data[bestI];
            const g = data[bestI + 1];
            const b = data[bestI + 2];
            const a = data[bestI + 3] / 255;
            const alpha = Math.min(1, Math.max(0.12, a * 0.96));

            const s = document.createElement("span");
            s.className = "pixel";
            s.style.left = `${((x - minX) / sample) * px}px`;
            s.style.top = `${((y - minY) / sample) * px}px`;
            s.style.background = `rgba(${r}, ${g}, ${b}, ${alpha.toFixed(3)})`;
            frag.appendChild(s);
          }
        }

        mount.style.width = `${Math.ceil(bw / sample) * px}px`;
        mount.style.height = `${Math.ceil(bh / sample) * px}px`;
        mount.innerHTML = "";
        mount.appendChild(frag);
      };

      img.src = src;
    };

    mounts.forEach((mount) => {
      if (mount.dataset.ready === "1") return;
      mount.dataset.ready = "1";
      buildFromImage(mount);
    });
  })();
</script>
